name: Build Windows Binary

on:
  workflow_dispatch:

jobs:
  build:
    name: Windows x86_64
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Release
        shell: bash
        run: |
          mkdir -p build/release
          cmake -S . -B build/release \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_UNITTESTS=OFF \
            -DEXTENSION_STATIC_BUILD=ON \
            -DBUILD_EXTENSIONS="core_functions;parquet;icu;json;vex" \
            -DSKIP_EXTENSIONS="jemalloc" \
            -G "Visual Studio 17 2022" -A x64
          cmake --build build/release --config Release --target shell -j

      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          find build/release -name "duckdb.exe" -type f | head -5
          cp build/release/tools/shell/Release/duckdb.exe dist/ 2>/dev/null || \
          cp build/release/tools/shell/duckdb.exe dist/ 2>/dev/null || \
          find build/release -name "duckdb.exe" -exec cp {} dist/ \;
          cp build/release/src/Release/*.dll dist/ 2>/dev/null || true
          echo "=== dist contents ==="
          ls -lh dist/

      - name: Smoke Test
        shell: bash
        run: |
          echo "SELECT l2_distance([1,0,0]::FLOAT[3], [0,1,0]::FLOAT[3]);" | dist/duckdb.exe
          echo "SELECT cosine_distance([1.0,0.0,0.0], [2.0,0.0,0.0]) AS same_dir;" | dist/duckdb.exe

      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: vexdb-lite-windows
          path: dist/*
