name: Bug Report
description: Report a bug in VexDB-Lite
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: dropdown
    id: backend
    attributes:
      label: Backend
      description: Which backend are you using?
      options:
        - DuckDB extension (vexdb_lite)
        - PostgreSQL plugin (vexdb_lite)
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: VexDB-Lite version and DuckDB/PostgreSQL version
      placeholder: "VexDB-Lite v0.0.11, DuckDB v1.5.2 / PostgreSQL 19"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: "Ubuntu 22.04, x86_64 / aarch64"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps
      render: sql
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Stack Trace
      render: text
