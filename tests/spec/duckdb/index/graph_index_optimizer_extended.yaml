description: Extended optimizer tests - operators, function variants, multi-index selection
steps:
- statement: CREATE TABLE t_multi (id INTEGER, vec ${VECTOR(8)});
- statement: "INSERT INTO t_multi SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT,\n  sin(i*0.2)::FLOAT, cos(i*0.2)::FLOAT,\n  sin(i*0.3)::FLOAT, cos(i*0.3)::FLOAT,\n  sin(i*0.4)::FLOAT, cos(i*0.4)::FLOAT\n\
    )::${VECTOR(8)}\nFROM ${RANGE2(1, 30001)} t(i);"
- statement: CREATE INDEX idx_l2 ON t_multi USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CREATE INDEX idx_cos ON t_multi USING ${VEX_INDEX} (vec${OPS_COSINE_COL})${IDX_OPTS_COSINE};
- statement: CREATE INDEX idx_ip ON t_multi USING ${VEX_INDEX} (vec${OPS_IP_COL})${IDX_OPTS_IP};
- query: EXPLAIN SELECT id FROM t_multi ORDER BY ${L2(vec, ${VEC_LITERAL([0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5], 8)})} LIMIT 10;
  _field_types: II
  expect:
  - - physical_plan
    - <REGEX>:.*VEXDB_INDEX_SCAN.*
