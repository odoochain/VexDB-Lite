name: index__graph_index_bf_threshold_correctness
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: vex_brute_force_threshold high enough to bypass the index must
steps:
- statement: CREATE TABLE bft_correctness (id INTEGER, vec ${VECTOR(4)});
- statement: INSERT INTO bft_correctness SELECT i, ${VEC_LITERAL([(i*0.13)::FLOAT, (i*0.07)::FLOAT, (i*0.21)::FLOAT, (i*0.05)::FLOAT], 4)} FROM ${RANGE(300)} t(i);
- statement: CREATE INDEX idx_bft ON bft_correctness USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: SET ${GUC_BF_THRESHOLD} = 100000;
- query: EXPLAIN SELECT id FROM bft_correctness ORDER BY ${L2(vec, ${VEC_LITERAL([13.0, 7.0, 21.0, 5.0], 4)})} LIMIT 5;
  _field_types: II
  expect:
  - - physical_plan
    - <!REGEX>:.*VEX_INDEX_SCAN.*
- query: SELECT id FROM bft_correctness ORDER BY ${L2(vec, ${VEC_LITERAL([13.0, 7.0, 21.0, 5.0], 4)})}, id LIMIT 5;
  _field_types: I
  expect:
  - - 100
  - - 99
  - - 101
  - - 98
  - - 102
- statement: SET ${GUC_BF_THRESHOLD} = 64;
- query: EXPLAIN SELECT id FROM bft_correctness ORDER BY ${L2(vec, ${VEC_LITERAL([13.0, 7.0, 21.0, 5.0], 4)})} LIMIT 5;
  _field_types: II
  expect:
  - - physical_plan
    - <REGEX>:.*VEX_INDEX_SCAN.*
- query: SELECT id FROM bft_correctness ORDER BY ${L2(vec, ${VEC_LITERAL([13.0, 7.0, 21.0, 5.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 100
- query: "SELECT COUNT(*) FROM (\n    SELECT id FROM bft_correctness\n    ORDER BY ${L2(vec, ${VEC_LITERAL([13.0, 7.0, 21.0, 5.0], 4)})}\n    LIMIT 3\n) WHERE id BETWEEN 98 AND 102;"
  _field_types: I
  expect:
  - - 3
- statement: DROP TABLE bft_correctness;
