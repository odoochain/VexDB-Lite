    - <REGEX>:.*VEX_INDEX_SCAN.*
- query: EXPLAIN SELECT id FROM t_plan ORDER BY array_distance(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)}) LIMIT 5;
