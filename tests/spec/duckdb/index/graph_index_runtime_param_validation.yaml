# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__graph_index_runtime_param_validation
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test runtime parameter validation (vex_ef_search, vex_brute_force_threshold)
steps:
- statement: CREATE TABLE t_param (id INTEGER, vec ${VECTOR(4)});
- statement: INSERT INTO t_param SELECT i, ${VEC_LITERAL([(i*0.1)::FLOAT, (i*0.2)::FLOAT, (i*0.3)::FLOAT, (i*0.4)::FLOAT], 4)} FROM ${RANGE(100)} t(i);
- statement: CREATE INDEX idx_param ON t_param USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
# 验证 vex_ef_search 越界报错需要走 HNSW 路径
- statement: SET ${GUC_BF_THRESHOLD} = 0;
- statement: SET ${GUC_EF_SEARCH} = -1;
- statement: SELECT * FROM t_param ORDER BY ${L2(vec, ${VEC_LITERAL([0.1, 0.2, 0.3, 0.4], 4)})} LIMIT 5;
  expect_error: vex_ef_search
- statement: SET ${GUC_EF_SEARCH} = 0;
- statement: SELECT * FROM t_param ORDER BY ${L2(vec, ${VEC_LITERAL([0.1, 0.2, 0.3, 0.4], 4)})} LIMIT 5;
  expect_error: vex_ef_search
- statement: SET ${GUC_EF_SEARCH} = 99999;
- statement: SELECT * FROM t_param ORDER BY ${L2(vec, ${VEC_LITERAL([0.1, 0.2, 0.3, 0.4], 4)})} LIMIT 5;
  expect_error: vex_ef_search
- statement: SET ${GUC_EF_SEARCH} = 40;
- query: SELECT count(*) FROM (SELECT * FROM t_param ORDER BY ${L2(vec, ${VEC_LITERAL([0.1, 0.2, 0.3, 0.4], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- statement: SET ${GUC_EF_SEARCH} = 5000;
- query: SELECT count(*) FROM (SELECT * FROM t_param ORDER BY ${L2(vec, ${VEC_LITERAL([0.1, 0.2, 0.3, 0.4], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- statement: RESET ${GUC_EF_SEARCH};
- statement: SET ${GUC_BF_THRESHOLD} = 99999999;
- statement: SELECT * FROM t_param ORDER BY ${L2(vec, ${VEC_LITERAL([0.1, 0.2, 0.3, 0.4], 4)})} LIMIT 5;
  expect_error: vex_brute_force_threshold
- statement: SET ${GUC_BF_THRESHOLD} = 100;
- query: SELECT count(*) FROM (SELECT * FROM t_param ORDER BY ${L2(vec, ${VEC_LITERAL([0.1, 0.2, 0.3, 0.4], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- statement: RESET ${GUC_BF_THRESHOLD};
- statement: DROP TABLE t_param;
_migrated_from: vexdb_duckdb/test/sql/vex/index/graph_index_runtime_param_validation.test
