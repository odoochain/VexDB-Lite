name: index__graph_index_highdim
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test graph index with high-dimensional vectors (64 and 128 dimensions)
steps:
- statement: CREATE TABLE vecs64 (id INTEGER, vec ${VECTOR(64)});
- statement: INSERT INTO vecs64 SELECT i, list_transform(${RANGE(64)}, x -> CASE WHEN x = i % 64 THEN 1.0 ELSE (x + i)::FLOAT / 1000.0 END)::${VECTOR(64)} FROM ${RANGE2(1, 21)} t(i);
- statement: INSERT INTO vecs64 VALUES (99, list_transform(${RANGE(64)}, x -> CASE WHEN x = 0 THEN 10.0 ELSE 0.0 END)::${VECTOR(64)});
- statement: CREATE INDEX idx64 ON vecs64 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx64';
  _field_types: I
  expect:
  - - 1
- query: 'SELECT id FROM vecs64

    ORDER BY ${L2(vec, list_transform(${RANGE(64)}, x -> CASE WHEN x = 0 THEN 10.0 ELSE 0.0 END)::${VECTOR(64)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 99
- query: 'SELECT id FROM vecs64

    ORDER BY ${L2(vec, list_transform(${RANGE(64)}, x -> CASE WHEN x = 5 THEN 1.0 ELSE 0.0 END)::${VECTOR(64)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 5
- query: SELECT COUNT(*) FROM vecs64;
  _field_types: I
  expect:
  - - 21
- statement: CREATE TABLE vecs128 (id INTEGER, vec ${VECTOR(128)});
- statement: INSERT INTO vecs128 SELECT i, list_transform(${RANGE(128)}, x -> CASE WHEN x = i % 128 THEN 5.0 ELSE (x * i)::FLOAT / 10000.0 END)::${VECTOR(128)} FROM ${RANGE2(1, 21)} t(i);
- statement: INSERT INTO vecs128 VALUES (100, list_transform(${RANGE(128)}, x -> 1.0)::${VECTOR(128)});
- statement: CREATE INDEX idx128 ON vecs128 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx128';
  _field_types: I
  expect:
  - - 1
- query: 'SELECT id FROM vecs128

    ORDER BY ${L2(vec, list_transform(${RANGE(128)}, x -> 1.0)::${VECTOR(128)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 100
- query: 'SELECT id FROM vecs128

    ORDER BY ${L2(vec, list_transform(${RANGE(128)}, x -> CASE WHEN x = 10 THEN 5.0 ELSE 0.0 END)::${VECTOR(128)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 10
- statement: INSERT INTO vecs128 VALUES (200, list_transform(${RANGE(128)}, x -> 2.0)::${VECTOR(128)});
- query: 'SELECT id FROM vecs128

    ORDER BY ${L2(vec, list_transform(${RANGE(128)}, x -> 2.0)::${VECTOR(128)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 200
- statement: DROP TABLE vecs64;
- statement: DROP TABLE vecs128;
