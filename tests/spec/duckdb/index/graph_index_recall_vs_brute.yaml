name: index__graph_index_recall_vs_brute
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: ANN top-k must agree with exact brute-force top-k across multiple
steps:
- statement: CREATE TABLE recall_test (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO recall_test SELECT i,\n    ${VEC_LITERAL([(i * 0.1)::FLOAT, (i * 0.2)::FLOAT, (i * 0.3)::FLOAT, (i * 0.4)::FLOAT], 4)}\n    FROM ${RANGE(500)} t(i);"
- statement: CREATE INDEX idx_recall ON recall_test USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM recall_test;
  _field_types: I
  expect:
  - - 500
- query: 'SELECT id FROM recall_test

    ORDER BY ${L2(vec, ${VEC_LITERAL([20.0, 40.0, 60.0, 80.0], 4)})} LIMIT 1;'
  _field_types: I
  expect:
  - - 200
- query: "SELECT COUNT(*) FROM (\n    SELECT id FROM recall_test\n    ORDER BY ${L2(vec, ${VEC_LITERAL([20.0, 40.0, 60.0, 80.0], 4)})}\n    LIMIT 3\n) WHERE id BETWEEN 199 AND 201;"
  _field_types: I
  expect:
  - - 3
- statement: DELETE FROM recall_test WHERE id BETWEEN 195 AND 205;
- query: SELECT COUNT(*) FROM recall_test;
  _field_types: I
  expect:
  - - 489
- query: 'SELECT id IN (194, 206) FROM recall_test

    ORDER BY ${L2(vec, ${VEC_LITERAL([20.0, 40.0, 60.0, 80.0], 4)})} LIMIT 1;'
  _field_types: I
  expect:
  - - 'true'
- query: "SELECT COUNT(*) FROM (\n    SELECT id FROM recall_test\n    ORDER BY ${L2(vec, ${VEC_LITERAL([20.0, 40.0, 60.0, 80.0], 4)})}\n    LIMIT 3\n) WHERE id IN (193, 194, 206, 207);"
  _field_types: I
  expect:
  - - 3
- statement: DELETE FROM recall_test WHERE id < 50;
- query: SELECT COUNT(*) FROM recall_test;
  _field_types: I
  expect:
  - - 439
- query: "SELECT COUNT(*) FROM (\n    SELECT id FROM recall_test\n    ORDER BY ${L2(vec, ${VEC_LITERAL([20.0, 40.0, 60.0, 80.0], 4)})}\n    LIMIT 3\n) WHERE id IN (193, 194, 206, 207);"
  _field_types: I
  expect:
  - - 3
- query: "SELECT COUNT(*) FROM (\n    SELECT id FROM recall_test\n    ORDER BY ${L2(vec, ${VEC_LITERAL([48.0, 96.0, 144.0, 192.0], 4)})}\n    LIMIT 3\n) WHERE id BETWEEN 478 AND 482;"
  _field_types: I
  expect:
  - - 3
- statement: DROP TABLE recall_test;
