name: index__graph_index_vacuum_serialize
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test Delete -> Vacuum -> Checkpoint -> Restart chain
steps:
- raw_directive: load __TEST_DIR__/vacuum_serialize.db
- statement: CREATE TABLE vac_test (id INTEGER PRIMARY KEY, vec ${VECTOR(4)});
- statement: CREATE INDEX idx ON vac_test USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: 'INSERT INTO vac_test SELECT i, list_value(sin(i*0.1)::FLOAT, cos(i*0.2)::FLOAT, sin(i*0.3)::FLOAT, cos(i*0.4)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(1, 201)} t(i);'
- query: SELECT count(*) FROM vac_test;
  _field_types: I
  expect:
  - - 200
- query: SELECT count(*) FROM (SELECT id FROM vac_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DELETE FROM vac_test WHERE id % 2 = 0;
- query: SELECT count(*) FROM vac_test;
  _field_types: I
  expect:
  - - 100
- statement: CHECKPOINT;
- raw_directive: restart
- query: SELECT count(*) FROM vac_test;
  _field_types: I
  expect:
  - - 100
- query: SELECT count(*) FROM (SELECT id FROM vac_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DELETE FROM vac_test WHERE id % 3 = 0;
- statement: 'INSERT INTO vac_test SELECT i, list_value(cos(i*0.5)::FLOAT, sin(i*0.6)::FLOAT, cos(i*0.7)::FLOAT, sin(i*0.8)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(201, 301)} t(i);'
- statement: CHECKPOINT;
- raw_directive: restart
- statement: SELECT count(*) FROM vac_test;
- query: SELECT count(*) FROM (SELECT id FROM vac_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DELETE FROM vac_test;
- query: SELECT count(*) FROM vac_test;
  _field_types: I
  expect:
  - - 0
- statement: CHECKPOINT;
- raw_directive: restart
- query: SELECT count(*) FROM vac_test;
  _field_types: I
  expect:
  - - 0
- query: SELECT count(*) FROM (SELECT id FROM vac_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 0
- statement: 'INSERT INTO vac_test SELECT i, list_value(sin(i*0.2)::FLOAT, cos(i*0.3)::FLOAT, sin(i*0.4)::FLOAT, cos(i*0.5)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(1, 151)} t(i);'
- query: SELECT count(*) FROM vac_test;
  _field_types: I
  expect:
  - - 150
- query: SELECT count(*) FROM (SELECT id FROM vac_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- raw_directive: loop cycle 0 5
  raw_body: ''
- statement: DELETE FROM vac_test WHERE id % (2 + ${cycle}) = 0;
- statement: CHECKPOINT;
- raw_directive: restart
- statement: SELECT count(*) FROM (SELECT id FROM vac_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 5);
- raw_directive: endloop
- statement: DROP TABLE vac_test;
