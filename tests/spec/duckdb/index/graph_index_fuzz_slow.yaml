# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__graph_index_fuzz_slow
tags:
- vex
- migrated
- slow
engines:
- duckdb
- pg
- opengauss
description: Fuzzing test - random-like operations on GRAPH_INDEX
steps:
- statement: CREATE TABLE fuzz (id INTEGER PRIMARY KEY, vec ${VECTOR(4)});
- statement: CREATE INDEX idx_fuzz ON fuzz USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: 'INSERT INTO fuzz SELECT i, list_value(sin(i)::FLOAT, cos(i)::FLOAT, sin(i*3)::FLOAT, cos(i*5)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(1, 101)} t(i);'
- statement: 'INSERT INTO fuzz SELECT i, list_value((i*0.01)::FLOAT, (i*0.02)::FLOAT, (i*0.03)::FLOAT, (i*0.04)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(101, 201)} t(i);'
- statement: 'INSERT INTO fuzz SELECT i, list_value(1.0, 1.0, 1.0, 1.0)::${VECTOR(4)}

    FROM ${RANGE2(201, 251)} t(i);'
- statement: 'INSERT INTO fuzz SELECT i, list_value((i*1000.0)::FLOAT, (i*-1000.0)::FLOAT, (i*999.0)::FLOAT, (i*-999.0)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(251, 301)} t(i);'
- statement: 'INSERT INTO fuzz SELECT i, list_value((i*0.0001)::FLOAT, (i*0.0002)::FLOAT, (i*0.0003)::FLOAT, (i*0.0004)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(301, 351)} t(i);'
- statement: 'INSERT INTO fuzz SELECT i, list_value((-i*0.1)::FLOAT, (-i*0.2)::FLOAT, (-i*0.3)::FLOAT, (-i*0.4)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(351, 401)} t(i);'
- query: SELECT count(*) FROM fuzz;
  _field_types: I
  expect:
  - - 400
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([99999.0, 99999.0, 99999.0, 99999.0], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([-99999.0, -99999.0, -99999.0, -99999.0], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([100.0, -100.0, 100.0, -100.0], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 1.0, 1.0, 1.0], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- statement: DELETE FROM fuzz WHERE id % 3 = 0;
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DELETE FROM fuzz WHERE id % 5 = 0;
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DELETE FROM fuzz WHERE id BETWEEN 101 AND 150;
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: 'INSERT INTO fuzz SELECT i, list_value(cos(i*7)::FLOAT, sin(i*11)::FLOAT, cos(i*13)::FLOAT, sin(i*17)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(401, 501)} t(i);'
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 20);
  _field_types: I
  expect:
  - - 20
- raw_directive: foreach limit_val 1 2 3 5 7 10 15 20 30 50 75 100
  raw_body: ''
- statement: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT ${limit_val});
- raw_directive: endloop
- raw_directive: loop qi 1 51
  raw_body: ''
- statement: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, list_value(sin(${qi})::FLOAT, cos(${qi})::FLOAT, sin(${qi}*2)::FLOAT, cos(${qi}*2)::FLOAT)::${VECTOR(4)})} LIMIT 5);
- raw_directive: endloop
- raw_directive: loop cycle 0 10
  raw_body: ''
- statement: 'INSERT INTO fuzz SELECT 501 + ${cycle} * 10 + i, list_value(sin(i + ${cycle})::FLOAT, cos(i + ${cycle})::FLOAT, sin(i*2 + ${cycle})::FLOAT, cos(i*2 + ${cycle})::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(0, 10)} t(i);'
- statement: DELETE FROM fuzz WHERE id BETWEEN 501 + ${cycle} * 10 AND 501 + ${cycle} * 10 + 4;
- statement: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 5);
- raw_directive: endloop
- statement: CHECKPOINT;
- raw_directive: loop uid 401 420
  raw_body: ''
- statement: UPDATE fuzz SET vec = list_value(sin(${uid}*3.14)::FLOAT, cos(${uid}*2.71)::FLOAT, sin(${uid}*1.41)::FLOAT, cos(${uid}*1.73)::FLOAT)::${VECTOR(4)} WHERE id = ${uid};
- raw_directive: endloop
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DELETE FROM fuzz WHERE id > 5;
- statement: SELECT count(*) FROM fuzz;
- statement: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 100);
- statement: DELETE FROM fuzz;
- statement: 'INSERT INTO fuzz SELECT i, list_value(sin(i*0.7)::FLOAT, cos(i*0.7)::FLOAT, sin(i*1.4)::FLOAT, cos(i*1.4)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(1, 1001)} t(i);'
- query: SELECT count(*) FROM fuzz;
  _field_types: I
  expect:
  - - 1000
- raw_directive: loop sq 1 21
  raw_body: ''
- statement: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, list_value(sin(${sq}*0.5)::FLOAT, cos(${sq}*0.5)::FLOAT, sin(${sq})::FLOAT, cos(${sq})::FLOAT)::${VECTOR(4)})} LIMIT 10);
- raw_directive: endloop
- statement: CHECKPOINT;
- query: SELECT count(*) FROM (SELECT id FROM fuzz ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DROP TABLE fuzz;
