- query: EXPLAIN SELECT id FROM t_recall ORDER BY ${L2(vec, ${VEC_LITERAL([0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5], 8)})} LIMIT 10;
  _field_types: II
  expect:
  - - physical_plan
    - <!REGEX>:.*HASH_JOIN.*
- statement: DROP TABLE t_recall;
