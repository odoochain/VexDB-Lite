# Regression: pre-optimize must rewrite ORDER BY dist LIMIT k even without
# OFFSET clause; otherwise LATE_MATERIALIZATION wraps the rewrite in a SEMI HASH_JOIN +
# SEQ_SCAN tree to materialize columns by row-id.
- statement: CREATE TABLE t_recall (id INTEGER, vec ${VECTOR(8)});
- statement: "INSERT INTO t_recall SELECT i, list_value(sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT, sin(i*0.2)::FLOAT, cos(i*0.2)::FLOAT, sin(i*0.3)::FLOAT, cos(i*0.3)::FLOAT, sin(i*0.4)::FLOAT, cos(i*0.4)::FLOAT)::${VECTOR(8)} FROM range(1, 30001) t(i);"
- statement: CREATE INDEX idx_recall_l2 ON t_recall USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: EXPLAIN SELECT id FROM t_recall ORDER BY ${L2(vec, ${VEC_LITERAL([0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5], 8)})} LIMIT 10;
  _field_types: II
