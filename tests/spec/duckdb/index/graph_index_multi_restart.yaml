# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__graph_index_multi_restart
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test multiple indexes on same table with restart
steps:
- raw_directive: load __TEST_DIR__/multi_restart.db
- statement: CREATE TABLE multi (id INTEGER, vec1 ${VECTOR(3)}, vec2 ${VECTOR(4)});
- statement: "INSERT INTO multi VALUES\n  (1,  ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}, ${VEC_LITERAL([0.0, 0.0, 0.0, 1.0], 4)}),\n  (2,  ${VEC_LITERAL([0.9, 0.1, 0.0], 3)}, ${VEC_LITERAL([0.0, 0.0, 1.0, 0.0],\
    \ 4)}),\n  (3,  ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}, ${VEC_LITERAL([0.0, 1.0, 0.0, 0.0], 4)}),\n  (4,  ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)}),\n  (5,  ${VEC_LITERAL([0.5,\
    \ 0.5, 0.0], 3)}, ${VEC_LITERAL([0.0, 0.5, 0.5, 0.0], 4)}),\n  (6,  ${VEC_LITERAL([0.0, 0.5, 0.5], 3)}, ${VEC_LITERAL([0.5, 0.0, 0.0, 0.5], 4)}),\n  (7,  ${VEC_LITERAL([0.5, 0.0, 0.5], 3)}, ${VEC_LITERAL([0.5,\
    \ 0.5, 0.0, 0.0], 4)}),\n  (8,  ${VEC_LITERAL([0.3, 0.3, 0.3], 3)}, ${VEC_LITERAL([0.25, 0.25, 0.25, 0.25], 4)});"
- statement: CREATE INDEX idx_v1 ON multi USING ${VEX_INDEX} (vec1${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CREATE INDEX idx_v2 ON multi USING ${VEX_INDEX} (vec2${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CHECKPOINT;
- raw_directive: restart
- statement: DELETE FROM multi WHERE id = -999;
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_v1';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_v2';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT id FROM multi ORDER BY ${L2(vec1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM multi ORDER BY ${L2(vec2, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 4
- statement: DELETE FROM multi WHERE id = 1;
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_v1';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_v2';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT id FROM multi ORDER BY ${L2(vec1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- query: SELECT id FROM multi ORDER BY ${L2(vec2, ${VEC_LITERAL([0.0, 0.0, 0.0, 1.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 6
- statement: CHECKPOINT;
- raw_directive: restart
- statement: DELETE FROM multi WHERE id = -999;
- query: SELECT count(*) FROM multi;
  _field_types: I
  expect:
  - - 7
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_v1';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_v2';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT id FROM multi ORDER BY ${L2(vec1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- query: SELECT id FROM multi ORDER BY ${L2(vec2, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 4
- statement: DROP TABLE multi;
_migrated_from: vexdb_duckdb/test/sql/vex/index/graph_index_multi_restart.test
