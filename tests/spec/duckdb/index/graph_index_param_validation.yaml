description: Test index creation parameter validation (m, ef_construction, metric, threads)
steps:
- statement: CREATE TABLE t_val (id BIGINT, v ${VECTOR(4)});
- statement: INSERT INTO t_val SELECT i, ${VEC_LITERAL([(i*0.1)::FLOAT, (i*0.2)::FLOAT, (i*0.3)::FLOAT, (i*0.4)::FLOAT], 4)} FROM ${RANGE(100)} t(i);
- statement: CREATE INDEX idx_neg ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(threads = -1)};
  expect_error: threads
- statement: CREATE INDEX idx_zero ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(threads = 0)};
  expect_error: threads
- statement: CREATE INDEX idx_huge ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(threads = 10000000)};
  expect_error: threads
- statement: CREATE INDEX idx_str ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(threads = 'aaa')};
  expect_error: threads
- statement: CREATE INDEX idx_ok1 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(threads = 1)};
- statement: DROP INDEX idx_ok1;
- statement: CREATE INDEX idx_ok4 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(threads = 4)};
- statement: DROP INDEX idx_ok4;
- statement: CREATE INDEX idx_m0 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(m = 0)};
  expect_error: m
- statement: CREATE INDEX idx_m1 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(m = 1)};
  expect_error: m
- statement: CREATE INDEX idx_m200 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(m = 200)};
  expect_error: m
- statement: CREATE INDEX idx_m8 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(m = 8)};
- statement: DROP INDEX idx_m8;
- statement: CREATE INDEX idx_ef0 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(ef_construction = 0)};
  expect_error: ef_construction
- statement: CREATE INDEX idx_efn ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(ef_construction = -1)};
  expect_error: ef_construction
- statement: CREATE INDEX idx_ef50k ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(ef_construction = 50000)};
  expect_error: ef_construction
- statement: CREATE INDEX idx_ef200 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(ef_construction = 200)};
- statement: DROP INDEX idx_ef200;
- statement: CREATE INDEX idx_m_str ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(m = 'aaa')};
  expect_error: must be a valid integer
- statement: CREATE INDEX idx_ef_str ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(ef_construction = 'aaa')};
  expect_error: must be a valid integer
- statement: CREATE INDEX idx_pq_str ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(quantizer = 'pq', pq_m = 'aaa')};
  expect_error: must be a valid integer
- statement: CREATE INDEX idx_pq_neg ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(quantizer = 'pq', pq_m = -1)};
  expect_error: got -1
- statement: CREATE INDEX idx_pq0 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(quantizer = 'pq', pq_m = 0)};
- statement: DROP INDEX idx_pq0;
- statement: CREATE INDEX idx_unk1 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(abc = 123)};
  expect_error: unknown option
- statement: CREATE INDEX idx_unk2 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(m = 16, unknown_param = 'hello')};
  expect_error: unknown option
- statement: CREATE INDEX idx_unk3 ON t_val USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_WITH_L2(ef_constuction = 200)};
  expect_error: unknown option
- statement: CREATE INDEX idx_valid ON t_val USING ${VEX_INDEX} (v${OPS_COSINE_COL})${IDX_WITH_COSINE(m = 16, ef_construction = 200)};
