# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__graph_index_restart_drop
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test DROP INDEX after restart (lazy binding + destroy interaction)
steps:
- raw_directive: load __TEST_DIR__/restart_drop1.db
- statement: CREATE TABLE t1 (id INTEGER, vec ${VECTOR(4)});
- statement: 'INSERT INTO t1 SELECT i, list_value(sin(i)::FLOAT, cos(i)::FLOAT, 0.0, 0.0)::${VECTOR(4)}

    FROM ${RANGE2(1, 101)} t(i);'
- statement: CREATE INDEX idx1 ON t1 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CHECKPOINT;
- raw_directive: restart
- statement: DROP INDEX idx1;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: I
  expect:
  - - 0
- query: SELECT count(*) FROM t1;
  _field_types: I
  expect:
  - - 100
- query: SELECT count(*) FROM (SELECT id FROM t1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0,0.0,0.0,0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DROP TABLE t1;
- raw_directive: load __TEST_DIR__/restart_drop2.db
- statement: CREATE TABLE t2 (id INTEGER, vec ${VECTOR(4)});
- statement: 'INSERT INTO t2 SELECT i, list_value(sin(i*0.1)::FLOAT, cos(i*0.2)::FLOAT, 0.0, 0.0)::${VECTOR(4)}

    FROM ${RANGE2(1, 51)} t(i);'
- statement: CREATE INDEX idx2 ON t2 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CHECKPOINT;
- raw_directive: restart
- statement: DROP INDEX idx2;
- statement: CREATE INDEX idx2 ON t2 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT count(*) FROM (SELECT id FROM t2 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0,0.0,0.0,0.0], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx2';
  _field_types: I
  expect:
  - - 1
- statement: CHECKPOINT;
- raw_directive: restart
- statement: DELETE FROM t2 WHERE id = -999;
- query: SELECT node_count > 0 FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx2';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx2';
  _field_types: I
  expect:
  - - 'true'
- statement: DROP TABLE t2;
- raw_directive: load __TEST_DIR__/restart_drop3.db
- statement: CREATE TABLE t3 (id INTEGER, vec ${VECTOR(4)});
- statement: 'INSERT INTO t3 SELECT i, list_value(sin(i)::FLOAT, cos(i)::FLOAT, 0.1, 0.2)::${VECTOR(4)}

    FROM ${RANGE2(1, 81)} t(i);'
- statement: CREATE INDEX idx3 ON t3 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CHECKPOINT;
- raw_directive: restart
- statement: DELETE FROM t3 WHERE id = -999;
- query: SELECT node_count > 0 FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx3';
  _field_types: I
  expect:
  - - 'true'
- statement: DROP INDEX idx3;
- query: SELECT COUNT(*) FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx3';
  _field_types: I
  expect:
  - - 0
- query: SELECT count(*) FROM t3;
  _field_types: I
  expect:
  - - 80
- statement: DROP TABLE t3;
