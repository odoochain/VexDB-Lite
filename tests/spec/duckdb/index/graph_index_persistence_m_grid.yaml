name: index__graph_index_persistence_m_grid
tags:
- vex
- regression
- persistence
- duck-only
engines:
- duckdb
description: GRAPH_INDEX persistence regression across m={4,8,12,32}. Default m=16 happened to round to a working FixedSizeAllocator segment_size; other m values hit SIGSEGV in DeserializeFromStorage during WAL replay (root cause in graph_index_disk.cpp::SerializeToWAL — InitSerializationToWAL must run before ExportStorageInfo, mirror ART::SerializeToWAL).
skip:
  duckdb: "pre-existing dev SIGSEGV in DeserializeFromStorage on m={4,8,12,32} WAL replay (2026-05-22). re-enable after the SerializeToWAL/InitSerializationToWAL ordering fix lands."

steps:
# ---- m=4 ----
- raw_directive: load __TEST_DIR__/graph_index_m4.db
- statement: CREATE TABLE t4 (id INTEGER, vec FLOAT[4]);
- statement: |
    INSERT INTO t4 SELECT i, [(i*0.1)::FLOAT, (i*0.2)::FLOAT, (i*0.3)::FLOAT, (i*0.4)::FLOAT]::FLOAT[4]
    FROM range(100) t(i);
- statement: CREATE INDEX idx4 ON t4 USING GRAPH_INDEX (vec) WITH (m=4, metric='l2');
- statement: CHECKPOINT;
- raw_directive: restart
- query: SELECT id FROM t4 ORDER BY l2_distance(vec, [0.0,0.0,0.0,0.0]::FLOAT[4]) LIMIT 3;
  _field_types: I
  expect:
  - - 0
  - - 1
  - - 2

