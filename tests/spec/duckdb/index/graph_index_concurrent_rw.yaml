# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: graph_index_concurrent_rw
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: >-
  Test concurrent read/write operations on graph index. Also the regression for the
  deleted_rids_ unlocked-read use-after-free (2026-06-04): GetNodeCount (optimizer
  path) / GetRowIdCount / SearchANN read the graph_rwlock_-guarded deleted_rids_
  unordered_set without holding graph_rwlock_, racing concurrent INSERT/DELETE
  (Append/Delete rehash deleted_rids_ under exclusive) -> use-after-free SEGV. The
  concurrent DELETE+SELECT blocks below exercise the optimizer GetNodeCount path on
  a non-empty deleted_rids_, which is what surfaces the race -- do NOT weaken them.
  Deterministic detection needs ASAN/TSan; bare repeated full-suite runs surface it
  ~20-80% on x86. See docs/analysis/2026-06-04_concurrent-rw-deleted-rids-race.md
steps:
- statement: CREATE TABLE t_conc1 (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO t_conc1 SELECT i, ${VEC_LITERAL([(i % 10)::FLOAT / 10.0, ((i / 10) % 10)::FLOAT / 10.0, (i % 5)::FLOAT / 5.0], 3)} FROM ${RANGE2(1, 201)} t(i);
- statement: CREATE INDEX idx_conc1 ON t_conc1 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- raw_directive: concurrentloop threadid 0 8
  raw_body: '# Thread 0: append new data'
- raw_directive: loop i 0 20
  raw_body: ''
- raw_directive: onlyif threadid=0
  raw_body: ''
- statement: INSERT INTO t_conc1 VALUES (1000 + ${i}, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)});
- raw_directive: endloop
- raw_directive: loop i 0 20
  raw_body: ''
- raw_directive: skipif threadid=0
  raw_body: ''
- query: SELECT count(*) >= 1 FROM (SELECT id FROM t_conc1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)})} LIMIT 5);
  _field_types: I
  expect:
  - - 'true'
- raw_directive: endloop
- raw_directive: endloop
- query: SELECT count(*) FROM t_conc1;
  _field_types: I
  expect:
  - - 220
- statement: DROP TABLE t_conc1;
- statement: CREATE TABLE t_conc2 (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO t_conc2 SELECT i, ${VEC_LITERAL([(i % 10)::FLOAT / 10.0, ((i / 10) % 10)::FLOAT / 10.0, (i % 7)::FLOAT / 7.0], 3)} FROM ${RANGE2(1, 501)} t(i);
- statement: CREATE INDEX idx_conc2 ON t_conc2 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- raw_directive: concurrentloop threadid 0 6
  raw_body: '# Thread 0: delete rows'
- raw_directive: loop i 0 10
  raw_body: ''
- raw_directive: onlyif threadid=0
  raw_body: ''
- statement: DELETE FROM t_conc2 WHERE id = ${i} * 5 + 1;
- raw_directive: endloop
- raw_directive: loop i 0 10
  raw_body: ''
- raw_directive: skipif threadid=0
  raw_body: ''
- query: SELECT count(*) >= 0 FROM (SELECT id FROM t_conc2 ORDER BY ${L2(vec, ${VEC_LITERAL([0.3, 0.3, 0.3], 3)})} LIMIT 10);
  _field_types: I
  expect:
  - - 'true'
- raw_directive: endloop
- raw_directive: endloop
- statement: DROP TABLE t_conc2;
- statement: CREATE TABLE t_conc3 (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_conc3 ON t_conc3 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- raw_directive: concurrentloop threadid 0 4
  raw_body: ''
- raw_directive: loop i 0 25
  raw_body: ''
- statement: INSERT INTO t_conc3 VALUES (${threadid} * 1000 + ${i}, ${VEC_LITERAL([${threadid}::FLOAT / 4.0, ${i}::FLOAT / 25.0, 0.5], 3)});
- raw_directive: endloop
- raw_directive: endloop
- query: SELECT count(*) FROM t_conc3;
  _field_types: I
  expect:
  - - 100
- query: SELECT count(*) FROM (SELECT id FROM t_conc3 ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DROP TABLE t_conc3;
- statement: CREATE TABLE t_conc4 (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO t_conc4 SELECT i, ${VEC_LITERAL([0.1 * (i % 10)::FLOAT, 0.1 * ((i/10) % 10)::FLOAT, 0.5], 3)} FROM ${RANGE2(1, 101)} t(i);
- statement: CREATE INDEX idx_conc4 ON t_conc4 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- raw_directive: concurrentloop threadid 0 4
  raw_body: '# Thread 0: delete odd ids from initial set'
- raw_directive: loop i 0 25
  raw_body: ''
- raw_directive: onlyif threadid=0
  raw_body: ''
- statement: DELETE FROM t_conc4 WHERE id = ${i} * 4 + 1;
- raw_directive: endloop
- raw_directive: loop i 0 25
  raw_body: ''
- raw_directive: onlyif threadid=1
  raw_body: ''
- statement: DELETE FROM t_conc4 WHERE id = ${i} * 4 + 2;
- raw_directive: endloop
- raw_directive: loop i 0 25
  raw_body: ''
- raw_directive: onlyif threadid=2
  raw_body: ''
- statement: INSERT INTO t_conc4 VALUES (500 + ${i}, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)});
- raw_directive: endloop
- raw_directive: loop i 0 25
  raw_body: ''
- raw_directive: onlyif threadid=3
  raw_body: ''
- query: SELECT count(*) >= 0 FROM (SELECT id FROM t_conc4 ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)})} LIMIT 5);
  _field_types: I
  expect:
  - - 'true'
- raw_directive: endloop
- raw_directive: endloop
- query: SELECT count(*) FROM (SELECT id FROM t_conc4 ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DROP TABLE t_conc4;
- statement: CREATE TABLE t_conc5 (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO t_conc5 SELECT i, ${VEC_LITERAL([(i % 10)::FLOAT / 10.0, ((i / 10) % 10)::FLOAT / 10.0, (i % 3)::FLOAT / 3.0], 3)} FROM ${RANGE2(1, 301)} t(i);
- statement: CREATE INDEX idx_conc5 ON t_conc5 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- raw_directive: concurrentloop threadid 0 10
  raw_body: ''
- raw_directive: loop i 0 20
  raw_body: '# Each thread searches with a different query vector'
- query: SELECT count(*) FROM (SELECT id FROM t_conc5 ORDER BY ${L2(vec, ${VEC_LITERAL([${threadid}::FLOAT / 10.0, 0.5, 0.5], 3)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- raw_directive: endloop
- raw_directive: endloop
- statement: DROP TABLE t_conc5;
