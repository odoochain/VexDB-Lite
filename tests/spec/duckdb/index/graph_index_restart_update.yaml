# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__graph_index_restart_update
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Verify UPDATE operations work correctly after restart (UPDATE = DELETE + INSERT)
steps:
- raw_directive: load __TEST_DIR__/restart_update1.db
- statement: CREATE TABLE t1 (id INTEGER, label VARCHAR, vec ${VECTOR(3)});
- statement: "INSERT INTO t1 VALUES\n  (1, 'a', ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, 'b', ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, 'c', ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (4, 'd', ${VEC_LITERAL([0.5,\
    \ 0.5, 0.0], 3)}),\n  (5, 'e', ${VEC_LITERAL([0.0, 0.5, 0.5], 3)});"
- statement: CREATE INDEX idx1 ON t1 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM t1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 4
- statement: CHECKPOINT;
- raw_directive: restart
- statement: UPDATE t1 SET vec = ${VEC_LITERAL([0.01, 0.01, 0.01], 3)} WHERE id = 1;
- query: SELECT id FROM t1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT node_count <= row_id_map_size FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT count(*) FROM t1;
  _field_types: I
  expect:
  - - 5
- statement: UPDATE t1 SET label = 'updated' WHERE id = 2;
- query: SELECT id, label FROM t1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})} LIMIT 1;
  _field_types: IT
  expect:
  - - 2
    - updated
- query: SELECT node_count <= row_id_map_size FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: I
  expect:
  - - 'true'
- statement: UPDATE t1 SET vec = ${VEC_LITERAL([(id * 0.1)::FLOAT, 0.0, 0.0], 3)};
- query: SELECT id FROM t1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT node_count <= row_id_map_size FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: I
  expect:
  - - 'true'
- statement: CHECKPOINT;
- raw_directive: restart
- statement: DELETE FROM t1 WHERE id = -999;
- query: SELECT id FROM t1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM t1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 5
- query: SELECT node_count <= row_id_map_size FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: I
  expect:
  - - 'true'
- statement: DROP TABLE t1;
- raw_directive: load __TEST_DIR__/restart_update2.db
- statement: CREATE TABLE t2 (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t2 SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.2)::FLOAT, sin(i*0.3)::FLOAT, cos(i*0.4)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 201)} t(i);"
- statement: CREATE INDEX idx2 ON t2 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CHECKPOINT;
- raw_directive: restart
- statement: UPDATE t2 SET vec = ${VEC_LITERAL([0.001, 0.001, 0.001, 0.001], 4)} WHERE id % 10 = 0;
- query: SELECT node_count <= row_id_map_size FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx2';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT id % 10 = 0 FROM t2 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0,0.0,0.0,0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 'true'
- query: SELECT count(*) FROM t2;
  _field_types: I
  expect:
  - - 200
- query: SELECT count(*) FROM (SELECT id FROM t2 ORDER BY ${L2(vec, ${VEC_LITERAL([1.0,1.0,1.0,1.0], 4)})} LIMIT 20);
  _field_types: I
  expect:
  - - 20
- statement: DROP TABLE t2;
_migrated_from: vexdb_duckdb/test/sql/vex/index/graph_index_restart_update.test
