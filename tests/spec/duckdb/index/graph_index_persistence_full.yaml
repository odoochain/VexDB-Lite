# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__graph_index_persistence_full
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Full persistence lifecycle - checkpoint, restart, insert, re-index
steps:
- raw_directive: load __TEST_DIR__/graph_index_persistence_full.db
- statement: CREATE TABLE vecs (id INTEGER, vec ${VECTOR(4)});
- statement: INSERT INTO vecs SELECT i, ${VEC_LITERAL([(i * 0.1)::FLOAT, (i * 0.2)::FLOAT, (i * 0.3)::FLOAT, (i * 0.4)::FLOAT], 4)} FROM ${RANGE(100)} t(i);
- query: SELECT COUNT(*) FROM vecs;
  _field_types: I
  expect:
  - - 100
- statement: CREATE INDEX idx ON vecs USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx';
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 3;
  _field_types: I
  expect:
  - - 0
  - - 1
  - - 2
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([5.0, 10.0, 15.0, 20.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 50
- statement: CHECKPOINT;
- raw_directive: restart
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx';
  _field_types: I
  expect:
  - - 1
- query: SELECT COUNT(*) FROM vecs;
  _field_types: I
  expect:
  - - 100
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 3;
  _field_types: I
  expect:
  - - 0
  - - 1
  - - 2
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([5.0, 10.0, 15.0, 20.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 50
- statement: INSERT INTO vecs SELECT 100 + i AS id, ${VEC_LITERAL([((100 + i) * 0.1)::FLOAT, ((100 + i) * 0.2)::FLOAT, ((100 + i) * 0.3)::FLOAT, ((100 + i) * 0.4)::FLOAT], 4)} FROM ${RANGE(50)} t(i);
- query: SELECT COUNT(*) FROM vecs;
  _field_types: I
  expect:
  - - 150
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([12.5, 25.0, 37.5, 50.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 125
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 0
- statement: CHECKPOINT;
- raw_directive: restart
- query: SELECT COUNT(*) FROM vecs;
  _field_types: I
  expect:
  - - 150
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx';
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 3;
  _field_types: I
  expect:
  - - 0
  - - 1
  - - 2
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([12.5, 25.0, 37.5, 50.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 125
- statement: DROP INDEX idx;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx';
  _field_types: I
  expect:
  - - 0
- query: SELECT COUNT(*) FROM vecs;
  _field_types: I
  expect:
  - - 150
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 0
- statement: CREATE INDEX idx_new ON vecs USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_new';
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 3;
  _field_types: I
  expect:
  - - 0
  - - 1
  - - 2
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([12.5, 25.0, 37.5, 50.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 125
- statement: DROP TABLE vecs;
