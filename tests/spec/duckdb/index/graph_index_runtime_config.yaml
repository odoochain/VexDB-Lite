# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__graph_index_runtime_config
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test runtime configuration parameters (vex_ef_search, vex_brute_force_threshold)
steps:
- query: SELECT current_setting('${GUC_EF_SEARCH}');
  _field_types: I
  expect:
  - - 40
- query: SELECT current_setting('${GUC_BF_THRESHOLD}');
  _field_types: I
  expect:
  - - 10000
- statement: SET ${GUC_EF_SEARCH} = 100;
- query: SELECT current_setting('${GUC_EF_SEARCH}');
  _field_types: I
  expect:
  - - 100
- statement: SET ${GUC_EF_SEARCH} = 200;
- query: SELECT current_setting('${GUC_EF_SEARCH}');
  _field_types: I
  expect:
  - - 200
- statement: RESET ${GUC_EF_SEARCH};
- query: SELECT current_setting('${GUC_EF_SEARCH}');
  _field_types: I
  expect:
  - - 40
- statement: SET ${GUC_BF_THRESHOLD} = 128;
- query: SELECT current_setting('${GUC_BF_THRESHOLD}');
  _field_types: I
  expect:
  - - 128
- statement: SET ${GUC_BF_THRESHOLD} = 0;
- query: SELECT current_setting('${GUC_BF_THRESHOLD}');
  _field_types: I
  expect:
  - - 0
- statement: RESET ${GUC_BF_THRESHOLD};
- query: SELECT current_setting('${GUC_BF_THRESHOLD}');
  _field_types: I
  expect:
  - - 10000
- statement: CREATE TABLE t_config (id INTEGER, vec ${VECTOR(4)});
- statement: INSERT INTO t_config SELECT i, ${VEC_LITERAL([(i * 0.1)::FLOAT, (i * 0.2)::FLOAT, (i * 0.3)::FLOAT, (i * 0.4)::FLOAT], 4)} FROM ${RANGE(500)} t(i);
- statement: CREATE INDEX idx_config ON t_config USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: SET ${GUC_EF_SEARCH} = 10;
- query: SELECT count(*) FROM (SELECT id FROM t_config ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- statement: SET ${GUC_EF_SEARCH} = 200;
- query: SELECT count(*) FROM (SELECT id FROM t_config ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- query: SELECT id FROM t_config ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 0
- statement: RESET ${GUC_EF_SEARCH};
- statement: SET ${GUC_BF_THRESHOLD} = 1000;
- query: SELECT id FROM t_config ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 0
- statement: SET ${GUC_BF_THRESHOLD} = 0;
- query: SELECT id FROM t_config ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 0
- statement: RESET ${GUC_BF_THRESHOLD};
- statement: DROP TABLE t_config;
