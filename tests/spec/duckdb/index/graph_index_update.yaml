name: index__graph_index_update
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test graph index behavior with UPDATE operations
steps:
- statement: CREATE TABLE vecs (id INTEGER, label VARCHAR, vec ${VECTOR(3)});
- statement: "INSERT INTO vecs VALUES\n  (1, 'a', ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, 'b', ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, 'c', ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (4, 'd', ${VEC_LITERAL([0.5,\
    \ 0.5, 0.0], 3)}),\n  (5, 'e', ${VEC_LITERAL([0.0, 0.5, 0.5], 3)});"
- statement: CREATE INDEX idx ON vecs USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 4
- statement: UPDATE vecs SET vec = ${VEC_LITERAL([0.01, 0.01, 0.01], 3)} WHERE id = 1;
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.01, 0.01, 0.01], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: UPDATE vecs SET label = 'updated_b' WHERE id = 2;
- query: SELECT id, label FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})} LIMIT 1;
  _field_types: IT
  expect:
  - - 2
    - updated_b
- query: SELECT count(*) FROM (SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 10);
  _field_types: I
  expect:
  - - 5
- statement: UPDATE vecs SET vec = ${VEC_LITERAL([0.0, 0.0, 0.0], 3)} WHERE label = 'c';
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: UPDATE vecs SET vec = ${VEC_LITERAL([(id * 0.1)::FLOAT, 0.0, 0.0], 3)};
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 5
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} DESC LIMIT 1;
  _field_types: I
  expect:
  - - 5
- query: SELECT count(*) FROM vecs;
  _field_types: I
  expect:
  - - 5
- statement: DROP TABLE vecs;
