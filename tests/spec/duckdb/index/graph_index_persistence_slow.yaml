# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__graph_index_persistence_slow
tags:
- vex
- migrated
- slow
engines:
- duckdb
- pg
- opengauss
description: Persistence test - checkpoint, restart, verify index survives
steps:
- raw_directive: load __TEST_DIR__/graph_index_persist_slow.db
- statement: CREATE TABLE vectors (id INTEGER PRIMARY KEY, vec ${VECTOR(4)});
- statement: CREATE INDEX idx_persist ON vectors USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: 'INSERT INTO vectors SELECT i, list_value(sin(i*0.1)::FLOAT, cos(i*0.2)::FLOAT, sin(i*0.3)::FLOAT, cos(i*0.4)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(1, 201)} t(i);'
- query: SELECT count(*) FROM vectors;
  _field_types: I
  expect:
  - - 200
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- raw_directive: restart
- query: SELECT count(*) FROM vectors;
  _field_types: I
  expect:
  - - 200
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})} LIMIT 5);
  _field_types: I
  expect:
  - - 5
- statement: DELETE FROM vectors WHERE id BETWEEN 1 AND 50;
- statement: 'INSERT INTO vectors SELECT i, list_value(cos(i*0.5)::FLOAT, sin(i*0.6)::FLOAT, cos(i*0.7)::FLOAT, sin(i*0.8)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(201, 301)} t(i);'
- query: SELECT count(*) FROM vectors;
  _field_types: I
  expect:
  - - 250
- statement: CHECKPOINT;
- raw_directive: restart
- query: SELECT count(*) FROM vectors;
  _field_types: I
  expect:
  - - 250
- query: SELECT count(*) FROM vectors WHERE id BETWEEN 1 AND 50;
  _field_types: I
  expect:
  - - 0
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)})} LIMIT 15);
  _field_types: I
  expect:
  - - 15
- statement: DELETE FROM vectors WHERE id % 2 = 0;
- statement: CHECKPOINT;
- raw_directive: restart
- statement: SELECT count(*) FROM vectors;
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 1.0, 1.0, 1.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DELETE FROM vectors;
- statement: CHECKPOINT;
- raw_directive: restart
- query: SELECT count(*) FROM vectors;
  _field_types: I
  expect:
  - - 0
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 0
- statement: 'INSERT INTO vectors SELECT i, list_value(sin(i*0.1)::FLOAT, cos(i*0.2)::FLOAT, sin(i*0.3)::FLOAT, cos(i*0.4)::FLOAT)::${VECTOR(4)}

    FROM ${RANGE2(1, 101)} t(i);'
- query: SELECT count(*) FROM vectors;
  _field_types: I
  expect:
  - - 100
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: CHECKPOINT;
- raw_directive: restart
- statement: DROP INDEX idx_persist;
- statement: CREATE INDEX idx_persist2 ON vectors USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- raw_directive: restart
- query: SELECT count(*) FROM (SELECT id FROM vectors ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- query: SELECT count(*) FROM vectors;
  _field_types: I
  expect:
  - - 100
- statement: DROP TABLE vectors;
