description: Test distance metric support (L2, cosine, inner_product) for GraphIndex
steps:
- statement: CREATE TABLE t_cos (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO t_cos VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (4, ${VEC_LITERAL([0.577, 0.577,\
    \ 0.577], 3)}),\n  (5, ${VEC_LITERAL([0.707, 0.707, 0.0], 3)});"
- statement: CREATE INDEX idx_cos ON t_cos USING ${VEX_INDEX} (vec${OPS_COSINE_COL})${IDX_OPTS_COSINE};
- query: SELECT id FROM t_cos ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM t_cos ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 3;
  _field_types: I
  expect:
  - - 1
  - - 5
  - - 4
- query: SELECT id FROM t_cos ORDER BY ${COSINE(vec, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: DROP TABLE t_cos;
- statement: CREATE TABLE t_cos_nn (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO t_cos_nn VALUES\n  (1, ${VEC_LITERAL([10.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 0.001, 0.0], 3)}),\n  (3, ${VEC_LITERAL([5.0, 5.0, 0.0], 3)}),\n  (4, ${VEC_LITERAL([100.0,\
