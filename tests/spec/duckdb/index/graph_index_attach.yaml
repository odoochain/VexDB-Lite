description: Test ATTACH database with graph index
steps:
- statement: ATTACH '__TEST_DIR__/attached.db' AS db2;
- statement: CREATE TABLE db2.vectors (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_attached ON db2.vectors USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO db2.vectors VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});"
- query: SELECT id FROM db2.vectors ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: CREATE TABLE main_items (id INTEGER, label VARCHAR);
- statement: INSERT INTO main_items VALUES (1, 'red'), (2, 'green'), (3, 'blue');
- query: "SELECT v.id, m.label FROM (\n  SELECT id FROM db2.vectors ORDER BY ${L2(vec, ${VEC_LITERAL([0.1, 1.0, 0.0], 3)})} LIMIT 2\n) v JOIN main_items m ON v.id = m.id\nORDER BY v.id;"
  _field_types: IT
  expect:
  - - 1
    - red
  - - 2
    - green
- statement: DROP TABLE main_items;
- statement: DROP TABLE db2.vectors;
- statement: DETACH db2;
