description: Verify index internal invariants that SQL-level tests cannot catch
steps:
- statement: CREATE TABLE t_inv1 (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_inv1 SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.2)::FLOAT, sin(i*0.3)::FLOAT, cos(i*0.4)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 201)} t(i);"
- statement: CREATE INDEX idx_inv1 ON t_inv1 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_inv1';
  _field_types: I
  expect:
  - - 'true'
- query: SELECT node_count > 0 AND row_id_map_size > 0 FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_inv1';
  _field_types: I
  expect:
  - - 'true'
- statement: DROP TABLE t_inv1;
