description: Test graph index (HNSW) creation and basic operations
steps:
- statement: CREATE TABLE vectors (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO vectors VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- statement: CREATE INDEX idx ON vectors USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx';
