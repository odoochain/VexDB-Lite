- statement: CREATE TABLE vectors2 (id INTEGER, vec ${VECTOR(128)});
- statement: INSERT INTO vectors2 SELECT i, list_transform(${RANGE(128)}, x -> (x + i)::FLOAT / 256.0)::${VECTOR(128)} FROM ${RANGE(100)} t(i);
- statement: CREATE INDEX idx2 ON vectors2 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx2';
  _field_types: I
  expect:
  - - 1
- statement: CREATE TABLE vec256 (id INTEGER, vec ${VECTOR(256)});
- statement: CREATE INDEX idx256 ON vec256 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx256';
  _field_types: I
  expect:
  - - 1
- statement: CREATE TABLE vec64 (id INTEGER, vec ${VECTOR(64)});
- statement: CREATE INDEX idx64 ON vec64 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
