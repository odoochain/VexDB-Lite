name: index__graph_index_concurrent
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test concurrent-like operations (sequential simulation)
steps:
- statement: CREATE TABLE t_rapid (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_rapid ON t_rapid USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: INSERT INTO t_rapid VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- query: SELECT id FROM t_rapid ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: INSERT INTO t_rapid VALUES (2, ${VEC_LITERAL([0.9, 0.1, 0.0], 3)});
- query: SELECT id FROM t_rapid ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: INSERT INTO t_rapid VALUES (3, ${VEC_LITERAL([0.99, 0.01, 0.0], 3)});
- query: SELECT id FROM t_rapid ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DELETE FROM t_rapid WHERE id = 1;
- query: SELECT id FROM t_rapid ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: DELETE FROM t_rapid WHERE id = 3;
- query: SELECT id FROM t_rapid ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- statement: DROP TABLE t_rapid;
- statement: CREATE TABLE t_reuse (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_reuse ON t_reuse USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO t_reuse VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});"
- query: SELECT count(*) FROM t_reuse;
  _field_types: I
  expect:
  - - 3
- statement: DELETE FROM t_reuse;
- query: SELECT count(*) FROM t_reuse;
  _field_types: I
  expect:
  - - 0
- statement: "INSERT INTO t_reuse VALUES\n  (4, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)}),\n  (5, ${VEC_LITERAL([0.0, 0.5, 0.5], 3)}),\n  (6, ${VEC_LITERAL([0.5, 0.0, 0.5], 3)});"
- query: SELECT id FROM t_reuse ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 4
- statement: DELETE FROM t_reuse;
- statement: "INSERT INTO t_reuse VALUES\n  (7, ${VEC_LITERAL([0.1, 0.1, 0.8], 3)}),\n  (8, ${VEC_LITERAL([0.8, 0.1, 0.1], 3)});"
- query: SELECT id FROM t_reuse ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 7
- statement: DROP TABLE t_reuse;
- statement: CREATE TABLE t_batch (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_batch ON t_batch USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: INSERT INTO t_batch SELECT i, ${VEC_LITERAL([(i % 10)::FLOAT / 10.0, ((i / 10) % 10)::FLOAT / 10.0, (i % 3)::FLOAT / 3.0], 3)} FROM ${RANGE2(1, 101)} t(i);
- query: SELECT count(*) FROM t_batch;
  _field_types: I
  expect:
  - - 100
- statement: DELETE FROM t_batch WHERE id % 2 = 0;
- query: SELECT count(*) FROM t_batch;
  _field_types: I
  expect:
  - - 50
- query: SELECT count(*) FROM (SELECT id FROM t_batch ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)})} LIMIT 10);
  _field_types: I
  expect:
  - - 10
- statement: DELETE FROM t_batch WHERE id % 3 = 0;
- statement: INSERT INTO t_batch SELECT i + 200, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)} FROM ${RANGE2(1, 21)} t(i);
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_batch\n  ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)})}\n  LIMIT 5\n) sub WHERE id > 200;"
  _field_types: I
  expect:
  - - 5
- statement: DROP TABLE t_batch;
- statement: CREATE TABLE t_multi_idx (id INTEGER, v1 ${VECTOR(3)}, v2 ${VECTOR(3)});
- statement: CREATE INDEX idx_v1 ON t_multi_idx USING ${VEX_INDEX} (v1${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CREATE INDEX idx_v2 ON t_multi_idx USING ${VEX_INDEX} (v2${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO t_multi_idx VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n\
    \  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});"
- query: SELECT id FROM t_multi_idx ORDER BY ${L2(v1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM t_multi_idx ORDER BY ${L2(v2, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: DELETE FROM t_multi_idx WHERE id = 1;
- query: SELECT id FROM t_multi_idx ORDER BY ${L2(v1, ${VEC_LITERAL([1.0, 0.1, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- query: SELECT id FROM t_multi_idx ORDER BY ${L2(v2, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: DROP TABLE t_multi_idx;
