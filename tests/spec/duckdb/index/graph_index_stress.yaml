name: index__graph_index_stress
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Stress and volume tests for graph index - 2000 rows, bulk delete, re-insert, multiple searches
steps:
- statement: CREATE TABLE stress_vecs (id INTEGER, vec ${VECTOR(4)});
- statement: INSERT INTO stress_vecs SELECT i AS id, ${VEC_LITERAL([(i * 0.01)::FLOAT, (i * 0.02)::FLOAT, (i * 0.03)::FLOAT, (i * 0.04)::FLOAT], 4)} FROM ${RANGE(2000)} t(i);
- query: SELECT COUNT(*) FROM stress_vecs;
  _field_types: I
  expect:
  - - 2000
- statement: CREATE INDEX idx_stress ON stress_vecs USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_stress';
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM stress_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 0
- query: SELECT id FROM stress_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([10.0, 20.0, 30.0, 40.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1000
- statement: DELETE FROM stress_vecs WHERE id < 500;
- query: SELECT COUNT(*) FROM stress_vecs;
  _field_types: I
  expect:
  - - 1500
- query: SELECT COUNT(*) FROM stress_vecs WHERE id < 500;
  _field_types: I
  expect:
  - - 0
- query: SELECT id FROM stress_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 500
- query: "SELECT COUNT(*) FROM (\n  SELECT id FROM stress_vecs\n  ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})}\n  LIMIT 5\n) t\nWHERE t.id >= 500;"
  _field_types: I
  expect:
  - - 5
- statement: INSERT INTO stress_vecs SELECT 2000 + i AS id, ${VEC_LITERAL([(i * 0.005)::FLOAT, (i * 0.01)::FLOAT, (i * 0.015)::FLOAT, (i * 0.02)::FLOAT], 4)} FROM ${RANGE(500)} t(i);
- query: SELECT COUNT(*) FROM stress_vecs;
  _field_types: I
  expect:
  - - 2000
- query: SELECT id FROM stress_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2000
- query: SELECT id FROM stress_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([10.0, 20.0, 30.0, 40.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1000
- query: SELECT id FROM stress_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([15.0, 30.0, 45.0, 60.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1500
- query: SELECT abs(id - 1999) <= 2 FROM stress_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([19.99, 39.98, 59.97, 79.96], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 'true'
- query: "SELECT COUNT(*) FROM (\n  SELECT id FROM stress_vecs\n  ORDER BY ${L2(vec, ${VEC_LITERAL([5.0, 10.0, 15.0, 20.0], 4)})}\n  LIMIT 10\n) t;"
  _field_types: I
  expect:
  - - 10
- query: "SELECT COUNT(*) FROM (\n  SELECT id FROM stress_vecs\n  ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 1.0, 1.5, 2.0], 4)})}\n  LIMIT 20\n) t;"
  _field_types: I
  expect:
  - - 20
- query: "SELECT COUNT(*) FROM (\n  SELECT id FROM stress_vecs\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 1.0, 1.0, 1.0], 4)})}\n  LIMIT 10\n) t;"
  _field_types: I
  expect:
  - - 10
- query: "SELECT COUNT(*) FROM (\n  SELECT id, ${L2(vec, ${VEC_LITERAL([7.5, 15.0, 22.5, 30.0], 4)})} AS dist\n  FROM stress_vecs\n  ORDER BY dist\n  LIMIT 10\n) t\nWHERE dist >= 0;"
  _field_types: I
  expect:
  - - 10
- statement: DROP TABLE stress_vecs;
