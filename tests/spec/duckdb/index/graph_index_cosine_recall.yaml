name: index__graph_index_cosine_recall
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Cosine recall quality — verify index results match brute-force
steps:
- statement: CREATE TABLE t_recall (id INTEGER, vec ${VECTOR(8)});
- statement: "INSERT INTO t_recall SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT,\n  sin(i*0.2)::FLOAT, cos(i*0.2)::FLOAT,\n  sin(i*0.3)::FLOAT, cos(i*0.3)::FLOAT,\n  sin(i*0.4)::FLOAT,\
    \ cos(i*0.4)::FLOAT\n)::${VECTOR(8)}\nFROM ${RANGE2(1, 301)} t(i);"
- statement: 'CREATE TABLE t_bf_result AS

    SELECT id FROM t_recall

    ORDER BY ${COSINE(vec, ${VEC_LITERAL([0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5], 8)})}

    LIMIT 10;'
- statement: CREATE INDEX idx_recall ON t_recall USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: 'CREATE TABLE t_idx_result AS

    SELECT id FROM t_recall

    ORDER BY ${COSINE(vec, ${VEC_LITERAL([0.5,0.5,0.5,0.5,0.5,0.5,0.5,0.5], 8)})}

    LIMIT 10;'
- query: SELECT count(*) >= 8 FROM t_bf_result WHERE id IN (SELECT id FROM t_idx_result);
  _field_types: I
  expect:
  - - 'true'
- statement: DROP TABLE t_bf_result;
- statement: DROP TABLE t_idx_result;
- statement: DROP TABLE t_recall;
- statement: CREATE TABLE t_cos_self (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_cos_self SELECT i, list_value(\n  (i * 1000.0)::FLOAT, 0.0, 0.0, 0.0\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 301)} t(i);"
- statement: CREATE INDEX idx_cos_self ON t_cos_self USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: DROP TABLE t_cos_self;
- statement: CREATE TABLE t_cos_self2 (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_cos_self2 SELECT i, list_value(\n  cos(i * 0.1)::FLOAT,\n  sin(i * 0.1)::FLOAT,\n  cos(i * 0.3)::FLOAT,\n  sin(i * 0.3)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 101)} t(i);"
- statement: CREATE INDEX idx_cos_self2 ON t_cos_self2 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_cos_self2';
  _field_types: I
  expect:
  - - 'true'
- query: "SELECT count(*) FROM (\n  SELECT t.id, (\n    SELECT s.id FROM t_cos_self2 s\n    ORDER BY ${COSINE(s.vec, t.vec)}\n    LIMIT 1\n  ) as found_id\n  FROM t_cos_self2 t\n) sub\nWHERE sub.id = sub.found_id;"
  _field_types: I
  expect:
  - - 100
- statement: DROP TABLE t_cos_self2;
- statement: CREATE TABLE t_mixed (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_mixed SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT,\n  sin(i*0.2)::FLOAT, cos(i*0.2)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 101)} t(i);"
- statement: CREATE INDEX idx_mixed ON t_mixed USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_mixed\n  ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)})}\n  LIMIT 10\n);"
  _field_types: I
  expect:
  - - 10
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_mixed\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)})}\n  LIMIT 10\n);"
  _field_types: I
  expect:
  - - 10
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_mixed\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)})}\n  LIMIT 10\n);"
  _field_types: I
  expect:
  - - 10
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_mixed\n  ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)})}\n  LIMIT 10\n);"
  _field_types: I
