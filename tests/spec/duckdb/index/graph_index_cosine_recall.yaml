- statement: DROP TABLE t_mixed;
- statement: CREATE TABLE t_cos_cycle (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_cos_cycle SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT,\n  sin(i*0.2)::FLOAT, cos(i*0.2)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 101)} t(i);"
- statement: CREATE INDEX idx_cos_cycle ON t_cos_cycle USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: DELETE FROM t_cos_cycle WHERE id <= 50;
- statement: "INSERT INTO t_cos_cycle SELECT i, list_value(\n  cos(i*0.1)::FLOAT, sin(i*0.1)::FLOAT,\n  cos(i*0.2)::FLOAT, sin(i*0.2)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(101, 151)} t(i);"
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_cos_cycle\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})}\n  LIMIT 10\n);"
  _field_types: I
  expect:
  - - 10
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_cos_cycle\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})}\n  LIMIT 100\n) sub\nWHERE sub.id <= 50;"
  _field_types: I
  expect:
  - - 0
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_cos_cycle';
