name: index__graph_index_persistence
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test graph index persistence across checkpoints
steps:
- raw_directive: load __TEST_DIR__/graph_index_persist.db
- statement: CREATE TABLE vecs (id INTEGER, vec ${VECTOR(4)});
- statement: INSERT INTO vecs SELECT i, ${VEC_LITERAL([(i * 0.1)::FLOAT, (i * 0.2)::FLOAT, (i * 0.3)::FLOAT, (i * 0.4)::FLOAT], 4)} FROM ${RANGE(100)} t(i);
- statement: CREATE INDEX idx ON vecs USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM vecs ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 0
- statement: CHECKPOINT;
- raw_directive: restart
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx';
  _field_types: I
  expect:
  - - 1
- query: SELECT count(*) FROM vecs;
  _field_types: I
  expect:
  - - 100
