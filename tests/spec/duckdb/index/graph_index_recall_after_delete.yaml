name: index__graph_index_recall_after_delete
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Quick smoke test for recall after deletions (2000 rows)
steps:
- statement: "CREATE TABLE recall_del AS\nSELECT i AS id,\n  ${VEC_LITERAL([sin(i*0.07)::FLOAT, cos(i*0.13)::FLOAT, sin(i*0.19+1)::FLOAT, cos(i*0.23+2)::FLOAT,\n   sin(i*0.29+3)::FLOAT, cos(i*0.31+4)::FLOAT,\
    \ sin(i*0.37+5)::FLOAT, cos(i*0.41+6)::FLOAT\n  ], 8)} AS vec\nFROM ${RANGE2(1, 2001)} t(i);"
- statement: CREATE INDEX idx_recall_del ON recall_del USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_WITH_L2(m = 16, ef_construction = 200)};
- statement: DELETE FROM recall_del WHERE id % 2 = 0;
- statement: SET disabled_optimizers='extension';
- statement: 'CREATE TABLE bf AS SELECT id FROM recall_del

    ORDER BY ${L2(vec, ${VEC_LITERAL([0.3,-0.5,0.7,-0.2,0.4,-0.6,0.8,-0.1], 8)})} LIMIT 10;'
- statement: RESET disabled_optimizers;
- query: "SELECT COUNT(*) >= 8 FROM (\n  SELECT id FROM recall_del\n  ORDER BY ${L2(vec, ${VEC_LITERAL([0.3,-0.5,0.7,-0.2,0.4,-0.6,0.8,-0.1], 8)})} LIMIT 10\n) ann WHERE ann.id IN (SELECT id FROM bf);"
  _field_types: I
  expect:
  - - 'true'
- statement: DELETE FROM recall_del WHERE id % 10 != 3;
- statement: SET disabled_optimizers='extension';
- statement: DROP TABLE bf;
- statement: 'CREATE TABLE bf AS SELECT id FROM recall_del

    ORDER BY ${L2(vec, ${VEC_LITERAL([0.3,-0.5,0.7,-0.2,0.4,-0.6,0.8,-0.1], 8)})} LIMIT 10;'
- statement: RESET disabled_optimizers;
- statement: SET disabled_optimizers='extension';
- query: "SELECT COUNT(*) >= 8 FROM (\n  SELECT id FROM recall_del\n  ORDER BY ${L2(vec, ${VEC_LITERAL([0.3,-0.5,0.7,-0.2,0.4,-0.6,0.8,-0.1], 8)})} LIMIT 10\n) ann WHERE ann.id IN (SELECT id FROM bf);"
  _field_types: I
  expect:
  - - 'true'
- statement: RESET disabled_optimizers;
- statement: DROP TABLE bf;
- statement: DROP TABLE recall_del;
