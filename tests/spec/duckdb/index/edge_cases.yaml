# auto-migrated from sqllogictest; review before relying on it
# 1. setup/teardown 未自动切分, 全在 steps; 必要时人工重组
# 2. 变量反向替换仅做高置信度模式 (FLOAT[N]/GRAPH_INDEX/距离函数)
# 3. 复杂指令 (loop/onlyif/skipif) 保留为 raw_directive
name: index__edge_cases
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test edge cases and boundary conditions for vex indexes
steps:
- statement: CREATE TABLE empty_vecs (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_empty ON empty_vecs USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT count(*) FROM (SELECT id FROM empty_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 5);
  _field_types: I
  expect:
  - - 0
- statement: INSERT INTO empty_vecs VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- query: SELECT id FROM empty_vecs ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE empty_vecs;
- statement: CREATE TABLE single (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO single VALUES (1, ${VEC_LITERAL([1.0, 2.0, 3.0], 3)});
- statement: CREATE INDEX idx_single ON single USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM single ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE single;
- statement: CREATE TABLE zeros (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO zeros VALUES\n  (1, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});"
- statement: CREATE INDEX idx_zeros ON zeros USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT count(*) FROM zeros WHERE ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} = 0;
  _field_types: I
  expect:
  - - 2
- statement: DROP TABLE zeros;
- statement: CREATE TABLE with_nulls (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO with_nulls VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, NULL),\n  (3, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)});"
- statement: CREATE INDEX idx_nulls ON with_nulls USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM with_nulls WHERE vec IS NOT NULL ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)})} LIMIT 2;
  _field_types: I
  expect:
  - - 1
  - - 3
- statement: DROP TABLE with_nulls;
- statement: CREATE TABLE limit_test (id INTEGER, vec ${VECTOR(2)});
- statement: INSERT INTO limit_test SELECT i, ${VEC_LITERAL([(i * 0.1)::FLOAT, 0.0], 2)} FROM ${RANGE(20)} t(i);
- statement: CREATE INDEX idx_limit ON limit_test USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM limit_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0], 2)})} LIMIT 3;
  _field_types: I
  expect:
  - - 0
  - - 1
  - - 2
- query: SELECT id FROM limit_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0], 2)})} LIMIT 3 OFFSET 2;
  _field_types: I
  expect:
  - - 2
  - - 3
  - - 4
- statement: DROP TABLE limit_test;
- statement: CREATE TABLE recreate (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO recreate VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}), (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)});
- statement: CREATE INDEX idx_rc ON recreate USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: DROP INDEX idx_rc;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_rc';
  _field_types: I
  expect:
  - - 0
- statement: CREATE INDEX idx_rc2 ON recreate USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_rc2';
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE recreate;
_migrated_from: vexdb_duckdb/test/sql/vex/index/edge_cases.test
