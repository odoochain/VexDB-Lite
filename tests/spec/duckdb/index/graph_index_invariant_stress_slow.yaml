- statement: DELETE FROM t_restart_inv WHERE id <= 100;
- query: SELECT node_count <= row_id_map_size FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_ri';
  _field_types: I
  expect:
