  _field_types: I
  expect:
  - - 'true'
- query: SELECT count(*) FROM (SELECT id FROM t_stress2 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0,0.0,0.0,0.0], 4)})} LIMIT 20);
  _field_types: I
  expect:
  - - 20
- statement: DROP TABLE t_stress2;
- statement: CREATE TABLE t_self500 (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_self500 SELECT i, list_value(\n  (i * 1000.0)::FLOAT, 0.0, 0.0, 0.0\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 501)} t(i);"
- statement: CREATE INDEX idx_self500 ON t_self500 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT node_count <= row_id_map_size FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_self500';
  _field_types: I
  expect:
  - - 'true'
- query: "SELECT count(*) FROM (\n  SELECT t.id, (\n    SELECT s.id FROM t_self500 s\n    ORDER BY ${L2(s.vec, t.vec)}\n    LIMIT 1\n  ) as found_id\n  FROM t_self500 t\n) sub\nWHERE sub.id = sub.found_id;"
  _field_types: I
  expect:
  - - 500
- statement: DROP TABLE t_self500;
- raw_directive: load __TEST_DIR__/invariant_restart.db
