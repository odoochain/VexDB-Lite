- statement: UPDATE t_restart_inv SET vec = ${VEC_LITERAL([0.0, 0.0, 0.0, 0.0], 4)} WHERE id BETWEEN 101 AND 150;
- query: SELECT node_count <= row_id_map_size FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_ri';
