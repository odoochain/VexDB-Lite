name: index__graph_index_cosine
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test cosine_distance with graph index — the most common real-world scenario
steps:
- statement: CREATE TABLE t_cos1 (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO t_cos1 VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (4, ${VEC_LITERAL([0.577, 0.577,\
    \ 0.577], 3)}),\n  (5, ${VEC_LITERAL([0.707, 0.707, 0.0], 3)});"
- statement: CREATE INDEX idx_cos1 ON t_cos1 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM t_cos1 ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM t_cos1 ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 3;
  _field_types: I
  expect:
  - - 1
  - - 5
  - - 4
- statement: DROP TABLE t_cos1;
- statement: CREATE TABLE t_cos2 (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_cos2 VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0, 0.0], 4)}),\n  (3, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)}),\n  (4, ${VEC_LITERAL([0.707,\
    \ 0.707, 0.0, 0.0], 4)});"
- statement: CREATE INDEX idx_cos2 ON t_cos2 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM t_cos2 ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})} LIMIT 2;
  _field_types: I
  expect:
  - - 1
  - - 4
- statement: DROP TABLE t_cos2;
- statement: CREATE TABLE t_embed (id INTEGER, vec ${VECTOR(16)});
- statement: "INSERT INTO t_embed SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT,\n  sin(i*0.2)::FLOAT, cos(i*0.2)::FLOAT,\n  sin(i*0.3)::FLOAT, cos(i*0.3)::FLOAT,\n  sin(i*0.4)::FLOAT, cos(i*0.4)::FLOAT,\n\
    \  sin(i*0.5)::FLOAT, cos(i*0.5)::FLOAT,\n  sin(i*0.6)::FLOAT, cos(i*0.6)::FLOAT,\n  sin(i*0.7)::FLOAT, cos(i*0.7)::FLOAT,\n  sin(i*0.8)::FLOAT, cos(i*0.8)::FLOAT\n)::${VECTOR(16)}\nFROM ${RANGE2(1,\
    \ 201)} t(i);"
- statement: CREATE INDEX idx_embed ON t_embed USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_embed';
  _field_types: I
  expect:
  - - 'true'
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_embed\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0,0.0,1.0,0.0,1.0,0.0,1.0,0.0,1.0,0.0,1.0,0.0,1.0,0.0,1.0,0.0], 16)})}\n  LIMIT 10\n);"
  _field_types: I
  expect:
  - - 10
- query: "SELECT count(*) FROM (\n  SELECT t.id, (\n    SELECT s.id FROM t_embed s\n    ORDER BY ${COSINE(s.vec, t.vec)}\n    LIMIT 1\n  ) as found_id\n  FROM t_embed t\n) sub\nWHERE sub.id = sub.found_id;"
  _field_types: I
  expect:
  - - 200
- statement: DROP TABLE t_embed;
- statement: CREATE TABLE t_cos_ins (id INTEGER, vec ${VECTOR(4)});
- statement: CREATE INDEX idx_cos_ins ON t_cos_ins USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO t_cos_ins SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT,\n  sin(i*0.2)::FLOAT, cos(i*0.2)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 101)} t(i);"
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_cos_ins\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)})}\n  LIMIT 10\n);"
  _field_types: I
  expect:
  - - 10
- statement: "INSERT INTO t_cos_ins SELECT i, list_value(\n  cos(i*0.1)::FLOAT, sin(i*0.1)::FLOAT,\n  cos(i*0.2)::FLOAT, sin(i*0.2)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(101, 201)} t(i);"
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_cos_ins\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([0.5, 0.5, 0.5, 0.5], 4)})}\n  LIMIT 20\n);"
  _field_types: I
  expect:
  - - 20
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_cos_ins';
  _field_types: I
  expect:
  - - 'true'
- statement: DROP TABLE t_cos_ins;
- statement: CREATE TABLE t_cos_del (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_cos_del SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT,\n  sin(i*0.2)::FLOAT, cos(i*0.2)::FLOAT\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 101)} t(i);"
- statement: CREATE INDEX idx_cos_del ON t_cos_del USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: DELETE FROM t_cos_del WHERE id <= 50;
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_cos_del\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})}\n  LIMIT 10\n);"
  _field_types: I
  expect:
  - - 10
- query: "SELECT count(*) FROM (\n  SELECT id FROM t_cos_del\n  ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})}\n  LIMIT 50\n) sub\nWHERE sub.id <= 50;"
  _field_types: I
  expect:
  - - 0
- statement: DROP TABLE t_cos_del;
- statement: CREATE TABLE t_cos_upd (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO t_cos_upd SELECT i, list_value(\n  sin(i*0.1)::FLOAT, cos(i*0.1)::FLOAT, 0.0, 0.0\n)::${VECTOR(4)}\nFROM ${RANGE2(1, 51)} t(i);"
- statement: CREATE INDEX idx_cos_upd ON t_cos_upd USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: UPDATE t_cos_upd SET vec = ${VEC_LITERAL([0.0, 0.0, 0.0, 1.0], 4)} WHERE id = 1;
- query: SELECT id FROM t_cos_upd ORDER BY ${COSINE(vec, ${VEC_LITERAL([0.0, 0.0, 0.0, 1.0], 4)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT node_count <= row_id_map_size FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_cos_upd';
  _field_types: I
  expect:
  - - 'true'
- statement: DROP TABLE t_cos_upd;
