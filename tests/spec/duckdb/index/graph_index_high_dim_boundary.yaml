name: graph_index_high_dim_boundary
tags: [migrated, regression, types]
description: "图索引支持向量维度提高至 16384. FLOAT[16383] 应可建表/建索引, 创建索引不应崩."
engines: [duckdb]
steps:
  - statement: DROP TABLE IF EXISTS t_dim_boundary;
  - statement: CREATE TABLE t_dim_boundary (id INTEGER, v ${VECTOR(16383)});
  # 插入少量数据以触发索引构建路径
  - statement: INSERT INTO t_dim_boundary SELECT i, list_transform(${RANGE(16383)}, x -> (x + i)::FLOAT / 16384.0)::${VECTOR(16383)} FROM ${RANGE(1, 3)} t(i);
  - statement: CREATE INDEX idx_dim_boundary ON t_dim_boundary USING ${VEX_INDEX} (v${OPS_L2_COL})${IDX_OPTS_L2};
  - query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_dim_boundary';
    _field_types: I
    expect: [[1]]
  - statement: DROP TABLE t_dim_boundary;
