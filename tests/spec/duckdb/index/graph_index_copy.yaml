name: index__graph_index_copy
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test COPY TO/FROM with graph index
steps:
- raw_directive: require parquet
- statement: CREATE TABLE t_copy (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_copy ON t_copy USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO t_copy VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});"
- statement: COPY t_copy TO '__TEST_DIR__/vectors.csv' (HEADER, DELIMITER ',');
- statement: CREATE TABLE t_import (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_import ON t_import USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: COPY t_import FROM '__TEST_DIR__/vectors.csv' (HEADER, DELIMITER ',');
- query: SELECT count(*) FROM t_import;
  _field_types: I
  expect:
  - - 3
- query: SELECT id FROM t_import ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: COPY t_copy TO '__TEST_DIR__/vectors.parquet' (FORMAT PARQUET);
- statement: CREATE TABLE t_parquet (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_parquet ON t_parquet USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: INSERT INTO t_parquet SELECT * FROM '__TEST_DIR__/vectors.parquet';
- query: SELECT count(*) FROM t_parquet;
  _field_types: I
  expect:
  - - 3
- query: SELECT id FROM t_parquet ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: CREATE TABLE t_target (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_target ON t_target USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: INSERT INTO t_target SELECT * FROM t_copy;
- query: SELECT count(*) FROM t_target;
  _field_types: I
  expect:
  - - 3
- query: SELECT id FROM t_target ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- statement: DROP TABLE t_target;
- statement: DROP TABLE t_parquet;
- statement: DROP TABLE t_import;
- statement: DROP TABLE t_copy;
_migrated_from: vexdb_duckdb/test/sql/vex/index/graph_index_copy.test
