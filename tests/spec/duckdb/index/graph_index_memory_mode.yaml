name: index__graph_index_memory_mode
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: vexdb_index_info() exposes memory_mode / memory_bytes / use_pq
steps:
- statement: CREATE TABLE vecs (id INTEGER, vec ${VECTOR(4)});
- statement: "INSERT INTO vecs SELECT i,\n    ${VEC_LITERAL([(i*0.1)::FLOAT, (i*0.2)::FLOAT, (i*0.3)::FLOAT, (i*0.4)::FLOAT], 4)}\nFROM ${RANGE(200)} t(i);"
- statement: CREATE INDEX idx_full ON vecs USING ${VEX_INDEX}(vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT memory_mode FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_full';
  _field_types: I
  expect:
  - - full
- query: SELECT (memory_bytes > 0)::INTEGER FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_full';
  _field_types: I
  expect:
  - - 1
- query: SELECT use_pq::INTEGER FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_full';
  _field_types: I
  expect:
  - - 0
- statement: DROP INDEX idx_full;
- statement: CREATE INDEX idx_compact ON vecs USING ${VEX_INDEX}(vec${OPS_L2_COL})${IDX_WITH_L2(memory_mode='compact')};
- query: SELECT memory_mode FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_compact';
  _field_types: I
  expect:
  - - compact
- query: SELECT use_pq::INTEGER FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_compact';
  _field_types: I
  expect:
  - - 1
- query: SELECT (memory_bytes > 0)::INTEGER FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_compact';
  _field_types: I
  expect:
  - - 1
- statement: DROP INDEX idx_compact;
- statement: CREATE INDEX idx_bad ON vecs USING ${VEX_INDEX}(vec${OPS_L2_COL})${IDX_WITH_L2(memory_mode='invalid')};
  expect_error: must be 'full' or 'compact'
- statement: CREATE INDEX idx_pq_explicit ON vecs USING ${VEX_INDEX}(vec${OPS_L2_COL})${IDX_WITH_L2(memory_mode='compact', quantizer='pq')};
- query: SELECT use_pq::INTEGER FROM vexdb_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx_pq_explicit';
  _field_types: I
  expect:
  - - 1
- statement: DROP INDEX idx_pq_explicit;
- statement: DROP TABLE vecs;
