  _field_types: I
  expect:
  - - 'NULL'
- query: SELECT ${L2(${VEC_LITERAL([1.0, 2.0, 3.0], 3)}, NULL)};
  _field_types: I
  expect:
  - - 'NULL'
- query: SELECT ${COSINE(NULL, ${VEC_LITERAL([1.0, 2.0, 3.0], 3)})};
  _field_types: I
  expect:
  - - 'NULL'
- query: SELECT ${NEG_IP(NULL, ${VEC_LITERAL([1.0, 2.0, 3.0], 3)})};
  _field_types: I
  expect:
  - - 'NULL'
- statement: CREATE TABLE t_null (id INTEGER, v ${VECTOR(3)});
- statement: INSERT INTO t_null VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- statement: INSERT INTO t_null VALUES (2, NULL);
- statement: INSERT INTO t_null VALUES (3, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)});
- query: SELECT id FROM t_null ORDER BY ${L2(v, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 2;
  _field_types: I
  expect:
  - - 1
  - - 3
