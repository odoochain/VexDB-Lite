  _field_types: I
  expect:
  - - 'true'
- query: SELECT ${L2(${VEC_LITERAL([-1.0, -2.0, -3.0], 3)}, ${VEC_LITERAL([1.0, 2.0, 3.0], 3)})};
  _field_types: R
