  _field_types: R
  expect:
  - - 0.0
- query: SELECT ${L2(${VEC_LITERAL([3.14, 2.71, 1.41], 3)}, ${VEC_LITERAL([3.14, 2.71, 1.41], 3)})};
  _field_types: R
  expect:
  - - 0.0
- query: SELECT ${COSINE(${VEC_LITERAL([3.14, 2.71, 1.41], 3)}, ${VEC_LITERAL([3.14, 2.71, 1.41], 3)})};
  _field_types: R
  expect:
  - - 0.0
- query: SELECT ${L2(${VEC_LITERAL([1e30, 0.0], 2)}, ${VEC_LITERAL([0.0, 0.0], 2)})} > 0;
  _field_types: I
  expect:
  - - 'true'
