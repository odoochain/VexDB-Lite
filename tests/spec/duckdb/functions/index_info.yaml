description: Test vex_index_info() table function coverage
steps:
- query: SELECT count(*) FROM vex_index_info();
  _field_types: I
  expect:
  - - 0
- statement: CREATE TABLE t1 (id INTEGER, vec ${VECTOR(4)});
- statement: INSERT INTO t1 SELECT i, ${VEC_LITERAL([(i * 0.1)::FLOAT, (i * 0.2)::FLOAT, (i * 0.3)::FLOAT, (i * 0.4)::FLOAT], 4)} FROM ${RANGE(100)} t(i);
- statement: CREATE INDEX idx1 ON t1 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT count(*) FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: I
  expect:
  - - 1
- query: SELECT ${SYS_INDEXES_NAME}, index_type, node_count, dimension FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: ITII
  expect:
  - - idx1
    - GRAPH_INDEX
    - 100
    - 4
- query: SELECT ${SYS_INDEXES_TABLE} FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: T
  expect:
  - - t1
- query: SELECT partition_count FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: I
  expect:
  - - 0
- query: SELECT m, ef_construction, metric, use_pq::INTEGER, pq_m FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: IITII
  expect:
  - - 16
    - 64
    - l2
    - 0
    - 0
- statement: CREATE TABLE t2 (id INTEGER, vec ${VECTOR(8)});
- statement: INSERT INTO t2 SELECT i, list_transform(${RANGE(8)}, x -> (x + i)::FLOAT / 100.0)::${VECTOR(8)} FROM ${RANGE(50)} t(i);
- statement: CREATE INDEX idx2 ON t2 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT count(*) FROM vex_index_info();
  _field_types: I
  expect:
  - - 2
- query: SELECT ${SYS_INDEXES_NAME}, index_type, node_count, dimension FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx2';
  _field_types: ITII
  expect:
  - - idx2
    - GRAPH_INDEX
    - 50
    - 8
- statement: DROP INDEX idx2;
- query: SELECT count(*) FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx2';
  _field_types: I
  expect:
  - - 0
- query: SELECT count(*) FROM vex_index_info() WHERE ${SYS_INDEXES_NAME} = 'idx1';
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE t1;
- statement: DROP TABLE t2;
- query: SELECT count(*) FROM vex_index_info();
  _field_types: I
  expect:
  - - 0
