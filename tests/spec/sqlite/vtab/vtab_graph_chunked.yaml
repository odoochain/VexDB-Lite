name: sqlite__vtab_graph_chunked
tags: [vex, sqlite]
description: 图 blob 分块序列化（graph_chunk_size 设小值强制多块；重开后多块拼接还原正确）
steps:
# chunk=4096 强制多块（100×4 维图序列化 >> 4KB）
- statement: CREATE VIRTUAL TABLE idx USING GRAPH_INDEX(embedding FLOAT[4], metric=l2, ef_search=80, graph_chunk_size=4096);
- statement: |
    WITH RECURSIVE c(i) AS (SELECT 1 UNION ALL SELECT i+1 FROM c WHERE i < 100)
    INSERT INTO idx(rowid, embedding)
    SELECT i, vexdb_f32('[' || i || ',' || i || ',' || i || ',' || i || ']') FROM c;
- query: SELECT rowid FROM idx WHERE embedding MATCH '[42,42,42,42]' AND k = 1;
  expect:
  - - 42
# special insert 触发写事务 → xSync 把 dirty 内存图分块落盘
- statement: INSERT INTO idx(idx) VALUES ('ef_search=80');
# 落盘必须是多块
- query: SELECT count(*) > 1 FROM idx_graph;
  expect:
  - - 1
- raw_directive: restart
# 重开走多块拼接 load，结果一致
- query: SELECT rowid, distance FROM idx WHERE embedding MATCH '[42,42,42,42]' AND k = 1;
  expect:
  - - 42
    - 0.0
- query: SELECT count(*) FROM idx;
  expect:
  - - 100
