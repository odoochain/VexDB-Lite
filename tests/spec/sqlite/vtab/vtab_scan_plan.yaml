name: sqlite__vtab_scan_plan
tags: [vex, sqlite]
description: 无 MATCH 的全扫计划（rowid 序、embedding 列回吐 BLOB、distance 为 NULL）
steps:
- statement: CREATE VIRTUAL TABLE idx USING GRAPH_INDEX(embedding FLOAT[2], metric=l2);
- statement: INSERT INTO idx(rowid, embedding) VALUES (2,'[2,2]'),(1,'[1,1]'),(3,'[3,3]');
- query: SELECT rowid FROM idx;
  expect:
  - - 1
  - - 2
  - - 3
- query: SELECT rowid, vexdb_vector_to_json(embedding) FROM idx WHERE rowid = 2;
  expect:
  - - 2
    - '[2,2]'
- query: SELECT count(*) FROM idx WHERE distance IS NULL;
  expect:
  - - 3
