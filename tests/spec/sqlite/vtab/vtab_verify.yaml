name: sqlite__vtab_verify
tags: [vex, sqlite]
description: 扩展自省——版本函数可调、全部函数已注册、shadow 表三件套与 vtab 共存于 sqlite_master（对照 duck graph_index_verify 行为面）
steps:
- query: SELECT vexdb_version() LIKE 'vexdb_lite sqlite extension%';
  expect:
  - - 1
# 六个标量函数全部注册（任一缺失会直接报 no such function）
- query: |
    SELECT vexdb_l2_distance('[1]','[2]') IS NOT NULL,
           vexdb_cosine_distance('[1,0]','[0,1]') IS NOT NULL,
           vexdb_inner_product('[1]','[2]') IS NOT NULL,
           vexdb_negative_inner_product('[1]','[2]') IS NOT NULL,
           length(vexdb_f32('[1]')) = 4,
           vexdb_vector_to_json(vexdb_f32('[7]')) = '[7]';
  expect:
  - - 1
    - 1
    - 1
    - 1
    - 1
    - 1
- statement: CREATE VIRTUAL TABLE v USING GRAPH_INDEX(embedding FLOAT[2], metric=l2);
- query: SELECT type, count(*) FROM sqlite_master WHERE name = 'v' OR name LIKE 'v_%' GROUP BY type ORDER BY type;
  expect:
  - - table
    - 4
