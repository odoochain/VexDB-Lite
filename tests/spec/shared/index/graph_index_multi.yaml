- opengauss
description: Test multiple graph indexes on different columns of the same table
steps:
- statement: CREATE TABLE multi_vec (id INTEGER, vec1 ${VECTOR(3)}, vec2 ${VECTOR(4)});
- statement: "INSERT INTO multi_vec VALUES\n  (1,  ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}, ${VEC_LITERAL([0.0, 0.0, 0.0, 1.0], 4)}),\n  (2,  ${VEC_LITERAL([0.9, 0.1, 0.0], 3)}, ${VEC_LITERAL([0.0, 0.0, 1.0,\
    \ 0.0], 4)}),\n  (3,  ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}, ${VEC_LITERAL([0.0, 1.0, 0.0, 0.0], 4)}),\n  (4,  ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)}),\n  (5,  ${VEC_LITERAL([0.5,\
    \ 0.5, 0.0], 3)}, ${VEC_LITERAL([0.0, 0.5, 0.5, 0.0], 4)}),\n  (6,  ${VEC_LITERAL([0.0, 0.5, 0.5], 3)}, ${VEC_LITERAL([0.5, 0.0, 0.0, 0.5], 4)}),\n  (7,  ${VEC_LITERAL([0.5, 0.0, 0.5], 3)}, ${VEC_LITERAL([0.5,\
    \ 0.5, 0.0, 0.0], 4)}),\n  (8,  ${VEC_LITERAL([0.3, 0.3, 0.3], 3)}, ${VEC_LITERAL([0.25, 0.25, 0.25, 0.25], 4)}),\n  (9,  ${VEC_LITERAL([0.1, 0.1, 0.8], 3)}, ${VEC_LITERAL([0.8, 0.1, 0.1, 0.0], 4)}),\n\
    \  (10, ${VEC_LITERAL([0.8, 0.1, 0.1], 3)}, ${VEC_LITERAL([0.0, 0.1, 0.1, 0.8], 4)});"
- statement: CREATE INDEX idx_vec1 ON multi_vec USING ${VEX_INDEX} (vec1${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CREATE INDEX idx_vec2 ON multi_vec USING ${VEX_INDEX} (vec2${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} IN ('idx_vec1', 'idx_vec2');
  _field_types: I
  expect:
  - - 2
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 1
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec1, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 3
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec2, ${VEC_LITERAL([0.0, 0.0, 0.0, 1.0], 4)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 1
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec2, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 4
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec1, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 4
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec2, ${VEC_LITERAL([0.0, 0.0, 1.0, 0.0], 4)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 2
- statement: DROP INDEX idx_vec1;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_vec1';
  _field_types: I
  expect:
  - - 0
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_vec2';
  _field_types: I
  expect:
  - - 1
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec2, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 4
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec2, ${VEC_LITERAL([0.0, 0.0, 0.0, 1.0], 4)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 1
- query: 'SELECT id FROM multi_vec

    ORDER BY ${L2(vec1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})}

    LIMIT 1;'
  _field_types: I
  expect:
  - - 1
- statement: DROP INDEX idx_vec2;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} IN ('idx_vec1', 'idx_vec2');
