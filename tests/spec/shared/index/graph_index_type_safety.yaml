description: Test type safety - dimension mismatch, wrong types
steps:
- statement: CREATE TABLE t_dim (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_dim ON t_dim USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: INSERT INTO t_dim VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- statement: INSERT INTO t_dim VALUES (2, ${VEC_LITERAL([1.0, 0.0], 2)});
  expect_error: ''
- statement: INSERT INTO t_dim VALUES (3, ${VEC_LITERAL([1.0, 0.0, 0.0, 0.0], 4)});
  expect_error: ''
- query: SELECT count(*) FROM t_dim;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE t_dim;
- statement: CREATE TABLE t_dist (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO t_dist VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- statement: SELECT ${L2(vec, ${VEC_LITERAL([1.0, 0.0], 2)})} FROM t_dist;
  expect_error: ''
- statement: DROP TABLE t_dist;
- statement: CREATE TABLE t_nonvec (id INTEGER, name VARCHAR);
- statement: CREATE INDEX idx_nonvec ON t_nonvec USING ${VEX_INDEX} (name${OPS_L2_COL})${IDX_OPTS_L2};
  expect_error: ''
- statement: DROP TABLE t_nonvec;
- statement: CREATE TABLE t_cast (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_cast ON t_cast USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: INSERT INTO t_cast VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- query: SELECT id FROM t_cast ORDER BY ${L2(vec, ${VEC_LITERAL([1, 0, 0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE t_cast;
