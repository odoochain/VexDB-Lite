name: index__graph_index_views
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test views and CTEs with graph index
steps:
- statement: CREATE TABLE items (id INTEGER, name VARCHAR, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_items ON items USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO items VALUES\n  (1, 'a', ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, 'b', ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, 'c', ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (4, 'd', ${VEC_LITERAL([0.7,\
    \ 0.7, 0.0], 3)}),\n  (5, 'e', ${VEC_LITERAL([0.0, 0.7, 0.7], 3)});"
- statement: 'CREATE VIEW v_near_origin AS

    SELECT id, name FROM items

    ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})}, id

    LIMIT 3;'
- query: SELECT * FROM v_near_origin ORDER BY id;
  _field_types: IT
  expect:
  - - 1
    - a
  - - 4
    - d
  - - 5
    - e
- statement: DROP VIEW v_near_origin;
- statement: 'CREATE VIEW v_near_x AS

    SELECT id FROM items

    ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})}

    LIMIT 2;'
- query: SELECT id FROM v_near_x;
  _field_types: I
  expect:
  - - 1
  - - 4
- statement: INSERT INTO items VALUES (6, 'f', ${VEC_LITERAL([0.95, 0.05, 0.0], 3)});
- query: SELECT id FROM v_near_x;
  _field_types: I
  expect:
  - - 1
  - - 6
- statement: DROP VIEW v_near_x;
- query: "WITH nearest AS (\n  SELECT id, name FROM items\n  ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})}\n  LIMIT 3\n),\nfiltered AS (\n  SELECT id FROM nearest WHERE id > 2\n)\nSELECT id FROM\
    \ filtered ORDER BY id;"
  _field_types: I
  expect:
  - - 4
  - - 5
- statement: CREATE TABLE categories (id INTEGER, cat VARCHAR);
- statement: INSERT INTO categories VALUES (1, 'X'), (2, 'Y'), (3, 'Z'), (4, 'X'), (5, 'Y'), (6, 'X');
- query: "SELECT n.id, c.cat FROM (\n  SELECT id FROM items ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 3\n) n JOIN categories c ON n.id = c.id\nORDER BY n.id;"
  _field_types: IT
  expect:
  - - 1
    - X
  - - 4
    - X
  - - 6
    - X
- statement: DROP TABLE categories;
- statement: DROP TABLE items;
_migrated_from: vexdb_duckdb/test/sql/vex/index/graph_index_views.test

