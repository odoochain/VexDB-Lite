description: Test ANN (Approximate Nearest Neighbor) search with graph index
steps:
- statement: CREATE TABLE products (id INTEGER, name VARCHAR, vec ${VECTOR(3)});
- statement: INSERT INTO products VALUES (1, 'Zero', ${VEC_LITERAL([0.0, 0.0, 0.0], 3)});
- statement: INSERT INTO products VALUES (2, 'Ones', ${VEC_LITERAL([1.0, 1.0, 1.0], 3)});
- statement: INSERT INTO products VALUES (3, 'Mixed', ${VEC_LITERAL([0.5, 0.5, 0.5], 3)});
- statement: INSERT INTO products VALUES (4, 'Small', ${VEC_LITERAL([0.1, 0.1, 0.1], 3)});
- statement: INSERT INTO products VALUES (5, 'Large', ${VEC_LITERAL([0.9, 0.9, 0.9], 3)});
- statement: CREATE INDEX idx_products_vec ON products USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_products_vec';
