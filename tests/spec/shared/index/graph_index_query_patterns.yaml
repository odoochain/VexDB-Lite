name: index__graph_index_query_patterns
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test various SQL query patterns with graph index
steps:
- statement: CREATE TABLE items (id INTEGER, name VARCHAR, category INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO items VALUES\n  (1, 'alpha',   1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, 'beta',    1, ${VEC_LITERAL([0.9, 0.1, 0.0], 3)}),\n  (3, 'gamma',   2, ${VEC_LITERAL([0.0, 1.0, 0.0],\
    \ 3)}),\n  (4, 'delta',   2, ${VEC_LITERAL([0.0, 0.9, 0.1], 3)}),\n  (5, 'epsilon', 3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (6, 'zeta',    3, ${VEC_LITERAL([0.1, 0.0, 0.9], 3)}),\n  (7, 'eta',  \
    \   1, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)}),\n  (8, 'theta',   2, ${VEC_LITERAL([0.0, 0.5, 0.5], 3)}),\n  (9, 'iota',    3, ${VEC_LITERAL([0.5, 0.0, 0.5], 3)}),\n  (10, 'kappa',  1, ${VEC_LITERAL([0.3,\
    \ 0.3, 0.3], 3)});"
- statement: CREATE INDEX idx_items ON items USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT *, ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} as dist FROM items ORDER BY dist, id LIMIT 3;
  _field_types: ITIIR
  expect:
  - - 1
    - alpha
    - 1
    - '[1.0, 0.0, 0.0]'
    - 0
  - - 2
    - beta
    - 1
    - '[0.9, 0.1, 0.0]'
    - 0.14142136275768283
  - - 7
    - eta
    - 1
    - '[0.5, 0.5, 0.0]'
    - 0.7071067811865476
- query: SELECT id, name FROM items ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})} LIMIT 3;
  _field_types: IT
  expect:
  - - 3
    - gamma
  - - 4
    - delta
  - - 7
    - eta
- query: "SELECT id FROM (\n  SELECT id, ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} as dist\n  FROM items\n  ORDER BY dist\n  LIMIT 10\n) sub\nWHERE id > 5\nORDER BY id;"
  _field_types: I
  expect:
  - - 6
  - - 7
  - - 8
  - - 9
  - - 10
- query: "WITH nearest AS (\n  SELECT id, name\n  FROM items\n  ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})}\n  LIMIT 5\n)\nSELECT id, name FROM nearest ORDER BY id;"
  _field_types: IT
  expect:
  - - 1
    - alpha
  - - 2
    - beta
  - - 7
    - eta
  - - 9
    - iota
  - - 10
    - kappa
- query: "SELECT count(*) FROM (\n  SELECT id FROM items ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)})} LIMIT 5\n);"
  _field_types: I
  expect:
  - - 5
- query: "SELECT count(DISTINCT category) FROM (\n  SELECT category FROM items ORDER BY ${L2(vec, ${VEC_LITERAL([0.3, 0.3, 0.3], 3)})} LIMIT 5\n);"
  _field_types: I
  expect:
  - - 3
- query: SELECT id FROM items ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 2;
  _field_types: I
  expect:
  - - 1
  - - 2
- query: SELECT id FROM items ORDER BY ${COSINE(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 2;
  _field_types: I
  expect:
  - - 1
  - - 2
- query: SELECT id FROM items ORDER BY ${IP(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} DESC LIMIT 2;
  _field_types: I
  expect:
  - - 1
  - - 2
- query: SELECT id FROM items ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} DESC LIMIT 3;
  _field_types: I
  expect:
  - - 3
  - - 5
  - - 4
- query: 'SELECT id, ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} as dist

    FROM items

    ORDER BY dist, id

    LIMIT 5;'
  _field_types: IR
  expect:
  - - 10
    - 0.5196152422706632
  - - 7
    - 0.7071067811865476
  - - 8
    - 0.7071067811865476
  - - 9
    - 0.7071067811865476
  - - 2
    - 0.9055385138137417
- query: 'SELECT id, name FROM items

    WHERE category = 1

    ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})}

    LIMIT 3;'
  _field_types: IT
  expect:
  - - 10
    - kappa
  - - 7
    - eta
  - - 2
    - beta
- query: "SELECT id FROM (\n  (SELECT id FROM items ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})}, id LIMIT 3)\n  UNION\n  (SELECT id FROM items ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0],\
    \ 3)})}, id LIMIT 3)\n) combined\nORDER BY id;"
  _field_types: I
  expect:
  - - 1
  - - 2
  - - 3
  - - 4
  - - 7
- statement: DROP TABLE items;
