description: Test graph index DDL interactions (DROP TABLE, TRUNCATE, ALTER TABLE, index lifecycle)
steps:
- statement: CREATE TABLE drop_test (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO drop_test VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});"
- statement: CREATE INDEX idx_drop ON drop_test USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_drop';
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE drop_test;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_drop';
  _field_types: I
  expect:
  - - 0
- statement: CREATE TABLE lifecycle (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO lifecycle VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (4, ${VEC_LITERAL([0.5,\
    \ 0.5, 0.0], 3)});"
- statement: CREATE INDEX idx_life ON lifecycle USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM lifecycle ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP INDEX idx_life;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_life';
  _field_types: I
  expect:
  - - 0
- statement: CREATE INDEX idx_life ON lifecycle USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_life';
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM lifecycle ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- statement: DROP INDEX idx_life;
- statement: CREATE INDEX idx_life ON lifecycle USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM lifecycle ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: DROP TABLE lifecycle;
- statement: CREATE TABLE trunc_test (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO trunc_test VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});"
- statement: CREATE INDEX idx_trunc ON trunc_test USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT count(*) FROM trunc_test;
  _field_types: I
  expect:
  - - 3
- statement: TRUNCATE TABLE trunc_test;
- query: SELECT count(*) FROM trunc_test;
  _field_types: I
  expect:
  - - 0
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_trunc';
  _field_types: I
  expect:
  - - 1
- query: SELECT count(*) FROM (SELECT id FROM trunc_test ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 5);
  _field_types: I
  expect:
  - - 0
- statement: "INSERT INTO trunc_test VALUES\n  (10, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)}),\n  (11, ${VEC_LITERAL([0.0, 0.5, 0.5], 3)});"
- query: SELECT id FROM trunc_test ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 10
- query: SELECT count(*) FROM trunc_test;
  _field_types: I
  expect:
  - - 2
- statement: DROP TABLE trunc_test;
- statement: CREATE TABLE source (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO source VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});"
- statement: CREATE INDEX idx_source ON source USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CREATE TABLE copied AS SELECT * FROM source;
- query: SELECT count(*) FROM copied;
  _field_types: I
  expect:
  - - 3
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_TABLE} = 'copied';
  _field_types: I
  expect:
  - - 0
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_source';
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM source ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM copied ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE copied;
- statement: DROP TABLE source;
- statement: CREATE TABLE alter_add (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO alter_add VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});"
- statement: CREATE INDEX idx_alter_add ON alter_add USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM alter_add ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: ALTER TABLE alter_add ADD COLUMN label VARCHAR;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_alter_add';
  _field_types: I
  expect:
  - - 1
- query: SELECT id FROM alter_add ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- statement: INSERT INTO alter_add VALUES (4, ${VEC_LITERAL([0.9, 0.1, 0.0], 3)}, 'test');
- query: SELECT id FROM alter_add ORDER BY ${L2(vec, ${VEC_LITERAL([0.91, 0.09, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 4
- statement: DROP TABLE alter_add;
- statement: CREATE TABLE alter_drop (id INTEGER, vec ${VECTOR(3)}, extra INTEGER);
- statement: "INSERT INTO alter_drop VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}, 100),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}, 200),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}, 300);"
- statement: CREATE INDEX idx_alter_drop ON alter_drop USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: ALTER TABLE alter_drop DROP COLUMN extra;
  expect_error: Cannot alter entry
- statement: DROP INDEX idx_alter_drop;
- statement: ALTER TABLE alter_drop DROP COLUMN extra;
- query: SELECT count(*) FROM alter_drop;
  _field_types: I
  expect:
  - - 3
- statement: CREATE INDEX idx_alter_drop ON alter_drop USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT id FROM alter_drop ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE alter_drop;
- statement: CREATE TABLE multi_idx (id INTEGER, vec ${VECTOR(3)});
- statement: "INSERT INTO multi_idx VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});"
- statement: CREATE INDEX idx_multi_a ON multi_idx USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CREATE INDEX idx_multi_b ON multi_idx USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} IN ('idx_multi_a', 'idx_multi_b');
  _field_types: I
  expect:
  - - 2
- query: SELECT id FROM multi_idx ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP INDEX idx_multi_a;
- query: SELECT id FROM multi_idx ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- statement: DROP INDEX idx_multi_b;
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_TABLE} = 'multi_idx';
  _field_types: I
  expect:
  - - 0
- query: SELECT id FROM multi_idx ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: DROP TABLE multi_idx;
- statement: DROP INDEX IF EXISTS idx_nonexistent;
- statement: CREATE TABLE idempotent (id INTEGER, vec ${VECTOR(3)});
- statement: INSERT INTO idempotent VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- statement: CREATE INDEX idx_idem ON idempotent USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CREATE INDEX IF NOT EXISTS idx_idem ON idempotent USING ${VEX_INDEX} (vec);
- query: SELECT COUNT(*) FROM ${SYS_INDEXES} WHERE ${SYS_INDEXES_NAME} = 'idx_idem';
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE idempotent;
