name: index__graph_index_optimizer_edge
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test optimizer edge cases that should NOT use index
steps:
- statement: CREATE TABLE t_opt (id INTEGER, val FLOAT, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_opt ON t_opt USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO t_opt VALUES\n  (1, 10.0, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, 20.0, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, 30.0, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (4, 40.0,\
    \ ${VEC_LITERAL([0.5, 0.5, 0.0], 3)}),\n  (5, 50.0, ${VEC_LITERAL([0.0, 0.5, 0.5], 3)});"
- query: SELECT id FROM t_opt ORDER BY val LIMIT 2;
  _field_types: I
  expect:
  - - 1
  - - 2
- query: SELECT id FROM t_opt ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} DESC LIMIT 2;
  _field_types: I
  expect:
  - - 2
  - - 3
- query: SELECT id FROM t_opt ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})};
  _field_types: I
  expect:
  - - 1
  - - 4
  - - 5
  - - 2
  - - 3
- query: SELECT id FROM t_opt ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})}, id LIMIT 3;
  _field_types: I
  expect:
  - - 4
  - - 5
  - - 1
- query: SELECT id FROM t_opt ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 2 OFFSET 1;
  _field_types: I
  expect:
  - - 4
  - - 5
- query: SELECT count(*) FROM (SELECT id FROM t_opt ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 3 OFFSET 100);
  _field_types: I
  expect:
  - - 0
- statement: CREATE TABLE t_two (id INTEGER, v1 ${VECTOR(3)}, v2 ${VECTOR(3)});
- statement: "INSERT INTO t_two VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)}, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)});"
- query: SELECT id FROM t_two ORDER BY ${L2(v1, v2)} LIMIT 1;
  _field_types: I
  expect:
  - - 2
- statement: DROP TABLE t_two;
- statement: CREATE TABLE t_meta (id INTEGER, label VARCHAR);
- statement: INSERT INTO t_meta VALUES (1, 'a'), (2, 'b'), (3, 'c'), (4, 'd'), (5, 'e');
- query: 'SELECT t_opt.id, t_meta.label

    FROM t_opt JOIN t_meta ON t_opt.id = t_meta.id

    ORDER BY ${L2(t_opt.vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})}

    LIMIT 2;'
  _field_types: IT
  expect:
  - - 1
    - a
  - - 4
    - d
- statement: DROP TABLE t_meta;
- statement: DROP TABLE t_opt;
