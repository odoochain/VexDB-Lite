description: Test WAL recovery combined with transaction semantics
steps:
- raw_directive: load __TEST_DIR__/wal_txn_1.db
- statement: CREATE TABLE t1 (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx1 ON t1 USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO t1 VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)});"
- statement: BEGIN;
- statement: INSERT INTO t1 VALUES (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});
- statement: COMMIT;
- raw_directive: restart
- query: SELECT count(*) FROM t1;
  _field_types: I
  expect:
  - - 3
- query: SELECT id FROM t1 ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 3
- statement: DROP TABLE t1;
- raw_directive: load __TEST_DIR__/wal_txn_2.db
- statement: CREATE TABLE t2 (id INTEGER, vec ${VECTOR(3)});
