- statement: BEGIN;
- statement: INSERT INTO t2 VALUES (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});
- statement: ROLLBACK;
- statement: BEGIN;
- statement: INSERT INTO t2 VALUES (4, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)});
- statement: COMMIT;
