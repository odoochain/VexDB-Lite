- query: SELECT id FROM t2 ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 4
- statement: DROP TABLE t2;
