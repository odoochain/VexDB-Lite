name: index__graph_index_prepared
tags:
- vex
- migrated
engines:
- duckdb
- pg
- opengauss
description: Test prepared statements and parameterized queries with graph index
steps:
- statement: CREATE TABLE t_prep (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_prep ON t_prep USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: "INSERT INTO t_prep VALUES\n  (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)}),\n  (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)}),\n  (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)}),\n  (4, ${VEC_LITERAL([0.5, 0.5,\
    \ 0.0], 3)}),\n  (5, ${VEC_LITERAL([0.0, 0.5, 0.5], 3)});"
- statement: PREPARE q1 AS SELECT id FROM t_prep ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT $1;
- query: EXECUTE q1(2);
  _field_types: I
  expect:
  - - 1
  - - 4
- query: EXECUTE q1(1);
  _field_types: I
  expect:
  - - 1
- statement: DEALLOCATE q1;
- statement: 'CREATE VIEW v_nearest AS

    SELECT id, ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} as dist

    FROM t_prep

    ORDER BY dist

    LIMIT 3;'
- query: SELECT id FROM v_nearest;
  _field_types: I
  expect:
  - - 1
  - - 4
  - - 5
- statement: DROP VIEW v_nearest;
- statement: PREPARE q3 AS SELECT id FROM t_prep ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)})} LIMIT $1;
- query: EXECUTE q3(1);
  _field_types: I
  expect:
  - - 3
- query: EXECUTE q3(3);
  _field_types: I
  expect:
  - - 3
  - - 5
  - - 4
- statement: DEALLOCATE q3;
- statement: PREPARE q4 AS SELECT count(*) FROM (SELECT id FROM t_prep ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)})} LIMIT $1);
- query: EXECUTE q4(3);
  _field_types: I
  expect:
  - - 3
- statement: DEALLOCATE q4;
- statement: DROP TABLE t_prep;
_migrated_from: vexdb_duckdb/test/sql/vex/index/graph_index_prepared.test

