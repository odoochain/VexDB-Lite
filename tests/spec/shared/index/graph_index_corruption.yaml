  _field_types: I
  expect:
  - - 0
- statement: "INSERT INTO t_delall VALUES\n  (4, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)}),\n  (5, ${VEC_LITERAL([0.0, 0.5, 0.5], 3)});"
- query: SELECT id FROM t_delall ORDER BY ${L2(vec, ${VEC_LITERAL([0.5, 0.5, 0.0], 3)})} LIMIT 1;
