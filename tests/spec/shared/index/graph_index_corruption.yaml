description: Test index robustness with corrupted/edge-case serialization
steps:
- statement: CREATE TABLE t_empty (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_empty ON t_empty USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: CHECKPOINT;
- query: SELECT count(*) FROM t_empty;
  _field_types: I
  expect:
  - - 0
- statement: INSERT INTO t_empty VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- query: SELECT id FROM t_empty ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE t_empty;
- statement: CREATE TABLE t_single (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_single ON t_single USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: INSERT INTO t_single VALUES (1, ${VEC_LITERAL([0.5, 0.5, 0.5], 3)});
- statement: CHECKPOINT;
- query: SELECT id FROM t_single ORDER BY ${L2(vec, ${VEC_LITERAL([0.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE t_single;
- statement: CREATE TABLE t_multi_ckpt (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_mc ON t_multi_ckpt USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
- statement: INSERT INTO t_multi_ckpt VALUES (1, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)});
- statement: CHECKPOINT;
- statement: INSERT INTO t_multi_ckpt VALUES (2, ${VEC_LITERAL([0.0, 1.0, 0.0], 3)});
- statement: CHECKPOINT;
- statement: INSERT INTO t_multi_ckpt VALUES (3, ${VEC_LITERAL([0.0, 0.0, 1.0], 3)});
- statement: CHECKPOINT;
- query: SELECT count(*) FROM t_multi_ckpt;
  _field_types: I
  expect:
  - - 3
- query: SELECT id FROM t_multi_ckpt ORDER BY ${L2(vec, ${VEC_LITERAL([1.0, 0.0, 0.0], 3)})} LIMIT 1;
  _field_types: I
  expect:
  - - 1
- statement: DROP TABLE t_multi_ckpt;
- statement: CREATE TABLE t_delall (id INTEGER, vec ${VECTOR(3)});
- statement: CREATE INDEX idx_delall ON t_delall USING ${VEX_INDEX} (vec${OPS_L2_COL})${IDX_OPTS_L2};
