# vexdb_graph on a partitioned table must be rejected up front with a
# clear "feature not supported" error rather than silently producing
# an index that returns wrong rows. (Per-leaf graph search does not
# reconverge globally; partitioned-table support is not yet ported.)
name: graph_index_partition_reject
tags:
- pg-only
- regression
- partition
description: |
  CREATE INDEX … USING vexdb_graph on a partitioned parent (or any
  child partition) must fail loud with errcode FEATURE_NOT_SUPPORTED
  rather than silently producing an index that returns wrong rows.
engines:
- pg
- opengauss
steps:
- statement: DROP TABLE IF EXISTS t_part_root;
- statement: |
    CREATE TABLE t_part_root (c1 int, c2 floatvector(4))
    PARTITION BY LIST (c1);
- statement: |
    CREATE TABLE t_part_a PARTITION OF t_part_root FOR VALUES IN (1, 2, 3);
- statement: |
    CREATE TABLE t_part_b PARTITION OF t_part_root FOR VALUES IN (4);
- statement: INSERT INTO t_part_root VALUES (1, '[1,2,3,4]'::floatvector);
- statement: INSERT INTO t_part_root VALUES (2, '[4,5,6,7]'::floatvector);
- statement: INSERT INTO t_part_root VALUES (4, '[7,8,9,10]'::floatvector);

# CREATE INDEX on the partition parent must be rejected
- query: CREATE INDEX idx_root ON t_part_root USING vexdb_graph (c2 floatvector_l2_ops);
  expect:
  - - ERROR ~ does not support partitioned tables

# CREATE INDEX on a child partition is also rejected (until lite
# implements the partition-aware scan path)
- query: CREATE INDEX idx_a ON t_part_a USING vexdb_graph (c2 floatvector_l2_ops);
  expect:
  - - ERROR ~ does not support partitioned tables

# Sanity: same DDL on a non-partitioned table still works
- statement: DROP TABLE IF EXISTS t_plain;
- statement: CREATE TABLE t_plain (c1 int, c2 floatvector(4));
- statement: INSERT INTO t_plain VALUES (1, '[1,2,3,4]'::floatvector);
- statement: CREATE INDEX idx_plain ON t_plain USING vexdb_graph (c2 floatvector_l2_ops);
- statement: DROP TABLE t_plain;

- statement: DROP TABLE t_part_root;
