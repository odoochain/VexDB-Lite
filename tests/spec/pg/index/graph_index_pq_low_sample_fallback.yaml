name: graph_index_pq_low_sample_fallback
tags:
- pg-only
- pq-v1
description: |
  init_quantizer hard-codes ksub=256 (nbits=8). With fewer rows than
  ksub the codebook can't be meaningfully trained, so init_quantizer
  must NOTICE + return false, qt_type falls back to NONE, and the
  index builds as plain HNSW. The metapage's quantizer_enable bit
  must NOT get flipped — otherwise reopen advertises elem_size =
  code_size and the scan reads garbage.

  Catches: silent fallback that flips set_enable() anyway (corrupt
  reopen), or hard ERROR instead of graceful fallback.

engines:
- pg
steps:
- statement: SET maintenance_work_mem = '2GB';
- statement: DROP TABLE IF EXISTS pq_low;
- statement: CREATE TABLE pq_low (id INTEGER, vec floatvector(8));
# 200 rows < ksub=256 → PQ training skipped, plain HNSW built.
- statement: "INSERT INTO pq_low SELECT i, ('[' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ']')::floatvector FROM generate_series(0, 199) AS t(i);"
- statement: CREATE INDEX idx_pq_low ON pq_low USING vexdb_graph (vec) WITH (quantizer='pq', pq_m=4);
- query: SELECT use_pq FROM vexdb_index_info() WHERE indexname='idx_pq_low';
  expect: [["f"]]
# Index still works for ANN (plain HNSW path).
- query: SELECT id FROM pq_low ORDER BY vec <-> '[50,50,50,50,50,50,50,50]'::floatvector LIMIT 1;
  expect: [["50"]]
- statement: DROP TABLE pq_low;
