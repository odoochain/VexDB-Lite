name: graph_index_halfvec_quantizer_smoke
tags: [pg-only, halfvec, pq-v1, rabitq, dml]
description: |
  halfvector with PQ and RaBitQ quantized indexes: build, search, and
  post-build INSERT. 10 k rows to pass min-sample threshold so the
  quantizer is actually active.
engines: [pg]
steps:
  # ---------- half + PQ + DML ----------
  - statement: SET maintenance_work_mem = '2GB';
  - statement: DROP TABLE IF EXISTS t_half_pq CASCADE;
  - statement: >
      CREATE TABLE t_half_pq (id serial, vec halfvector(8));
  - statement: >
      INSERT INTO t_half_pq (vec)
      SELECT ('[' || i || ',' || i || ',' || i || ',' || i || ','
                   || i || ',' || i || ',' || i || ',' || i || ']')::halfvector
      FROM generate_series(0, 9999) AS t(i);
  - statement: >
      CREATE INDEX idx_half_pq ON t_half_pq USING vexdb_graph (vec halfvector_l2_ops)
      WITH (metric=L2, quantizer=pq, pq_m=4);
  - query: SELECT count(*) FROM t_half_pq
    expect: [["10000"]]
  - statement: >
      INSERT INTO t_half_pq (vec) VALUES ('[50,50,50,50,50,50,50,50]'::halfvector);
  - query: SELECT count(*) FROM t_half_pq
    expect: [["10001"]]
  - query: SELECT id FROM t_half_pq WHERE id = 10001
    expect: [["10001"]]
  - statement: DROP TABLE t_half_pq CASCADE;

  # ---------- half + RaBitQ + DML ----------
  - statement: SET maintenance_work_mem = '512MB';
  - statement: DROP TABLE IF EXISTS t_half_rq CASCADE;
  - statement: >
      CREATE TABLE t_half_rq (id serial, vec halfvector(8));
  - statement: >
      INSERT INTO t_half_rq (vec)
      SELECT ('[' || i || ',' || i || ',' || i || ',' || i || ','
                   || i || ',' || i || ',' || i || ',' || i || ']')::halfvector
      FROM generate_series(0, 9999) AS t(i);
  - statement: >
      CREATE INDEX idx_half_rq ON t_half_rq USING vexdb_graph (vec halfvector_l2_ops)
      WITH (metric=L2, quantizer=rabitq);
  - query: SELECT count(*) FROM t_half_rq
    expect: [["10000"]]
  - statement: >
      INSERT INTO t_half_rq (vec) VALUES ('[50,50,50,50,50,50,50,50]'::halfvector);
  - query: SELECT count(*) FROM t_half_rq
    expect: [["10001"]]
  - query: SELECT id FROM t_half_rq WHERE id = 10001
    expect: [["10001"]]
  - statement: DROP TABLE t_half_rq CASCADE;
