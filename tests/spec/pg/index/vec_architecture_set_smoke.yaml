name: vec_architecture_set_smoke
tags: [pg-only, migrated, regression, simd]
description: |
  vexdb.vec_architecture GUC must accept the documented rule formats
  (usage:arch list) and a subsequent ANN search must still return correct results.
  Detailed per-arch dispatch unit tests live in distance/simd; this is the
  GUC-syntax surface smoke.
engines: [pg]
skip:
  pg: "GUC token 集合 'all:scalar' / 'l2:scalar, ip:scalar' 被 vexdb_vector check_hook 拒绝, 待与主库 openGauss-vector-main vec_architecture 校验器对齐"
steps:
  - statement: DROP TABLE IF EXISTS t_va_rule;
  - statement: CREATE TABLE t_va_rule (id int, v floatvector(8));
  - statement: |
      INSERT INTO t_va_rule
      SELECT i, ('[' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ']')::floatvector
      FROM generate_series(1, 50) AS t(i);
  - statement: CREATE INDEX idx_va_rule ON t_va_rule USING vexdb_graph (v floatvector_l2_ops);

  - statement: SET vexdb.vec_architecture = 'all:scalar';
  - query: SELECT count(*) FROM (SELECT id FROM t_va_rule ORDER BY v <-> '[10,10,10,10,10,10,10,10]'::floatvector LIMIT 5) s;
    expect: [["5"]]

  - statement: SET vexdb.vec_architecture = 'l2:scalar, ip:scalar';
  - query: SELECT count(*) FROM (SELECT id FROM t_va_rule ORDER BY v <-> '[10,10,10,10,10,10,10,10]'::floatvector LIMIT 5) s;
    expect: [["5"]]

  - statement: RESET vexdb.vec_architecture;
  - query: SELECT count(*) FROM (SELECT id FROM t_va_rule ORDER BY v <-> '[10,10,10,10,10,10,10,10]'::floatvector LIMIT 5) s;
    expect: [["5"]]
