name: graph_index_no_analyze_reltuples
tags:
- pg-only
- graph-index
- regression
- parallel-build
description: |
  Regression for: `get_relstats_reltuples` 把 `pg_class.reltuples` (float4)
  直接 `(size_t)cast`。新建表未 ANALYZE 时 reltuples = -1.0(PG 用 -1 表示
  "stats not collected yet"),cast 成 uint64 → 0xFFFFFFFFFFFFFFFF 巨大正数,
  绕过 caller 的 `reltuples > 0` 守卫,让 `est_from_reltuples = reltuples * 1.3`
  变成天文数字 → `vector_chunk_size = elem_size * 2^pow_of_estimated_rows`
  → DSM 估算 442 GB(实测 cohere 1M × 768d × 4B 的场景)。

  begin_parallel 看 DSM > /dev/shm 配额,主动 fallback 到 serial build:
    NOTICE: graph_index: DSM estimate 442844 MB exceeds available...
    falling back to serial build

  但 fallback 路径自己 crash 在 PG core `LWLockAttemptLock`(根因独立,
  跟 cohere 1M × 768d 配合 autovacuum cancel 触发,但不在本 spec 范围)。

  Fix(src/ann_utils.cpp): 负值视为 0,让 caller 走 page-based estimate。

  此 spec 不依赖大数据 — 触发条件就是 "新建表 + 立刻 CREATE INDEX 不 ANALYZE"。
  20k × 768d 足以让 begin_parallel 走 estimated_rows 分支,验证 reltuples=-1
  不再让 DSM 估算爆炸。

engines:
- pg
steps:
- statement: SET maintenance_work_mem = '2GB';
- statement: SET max_parallel_maintenance_workers = 2;
- statement: DROP TABLE IF EXISTS gi_no_analyze_relt;
- statement: |
    CREATE TABLE gi_no_analyze_relt AS
    SELECT
      i AS id,
      (
        '[' || array_to_string(
          array(SELECT (i + j)::float4 / 1000.0 FROM generate_series(0, 767) AS s(j)),
          ','
        ) || ']'
      )::floatvector(768) AS vec
    FROM generate_series(0, 19999) AS t(i);
# 故意 NOT ANALYZE — reltuples 会保持 -1,触发 cast bug 路径
- query: SELECT reltuples::int FROM pg_class WHERE relname='gi_no_analyze_relt';
  expect:
    - ["-1"]
# 旧代码:DSM 估算爆炸 → fallback → crash。修后:reltuples=-1 视为 0,
# page-based estimate 给出合理值,parallel build 完成。
- statement: |
    CREATE INDEX gi_no_analyze_relt_idx ON gi_no_analyze_relt
    USING vexdb_graph (vec floatvector_l2_ops)
    WITH (m=16, ef_construction=64, parallel_workers=2);
- query: |
    SELECT id FROM gi_no_analyze_relt
    ORDER BY vec <-> (
      '[' || array_to_string(
        array(SELECT j::float4 / 1000.0 FROM generate_series(0, 767) AS s(j)),
        ','
      ) || ']'
    )::floatvector(768)
    LIMIT 1;
  expect:
    - ["0"]
- statement: DROP TABLE gi_no_analyze_relt;
