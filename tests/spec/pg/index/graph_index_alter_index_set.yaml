name: graph_index_alter_index_set
tags: [pg-only, migrated, regression]
description: |
  ALTER INDEX ... SET (m=, ef_construction=,
  parallel_workers=) must succeed for vexdb_graph reloptions. The change
  doesn't rebuild — it only updates relopts; verify that subsequent
  REINDEX picks them up and a KNN search still returns rows.
engines: [pg]
steps:
  - statement: SET maintenance_work_mem = '512MB';
  - statement: DROP TABLE IF EXISTS t_alter_set;
  - statement: CREATE TABLE t_alter_set (id int, v floatvector(8));
  - statement: |
      INSERT INTO t_alter_set
      SELECT i, ('[' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ',' || i || ']')::floatvector
      FROM generate_series(1, 100) AS t(i);
  - statement: CREATE INDEX idx_alter_set ON t_alter_set USING vexdb_graph (v floatvector_l2_ops) WITH (m=8, ef_construction=16);

  - statement: ALTER INDEX idx_alter_set SET (ef_construction = 64);
  - statement: ALTER INDEX idx_alter_set SET (m = 16, parallel_workers = 2);
  - statement: REINDEX INDEX idx_alter_set;

  - query: SELECT count(*) FROM (SELECT id FROM t_alter_set ORDER BY v <-> '[10,10,10,10,10,10,10,10]'::floatvector LIMIT 5) s;
    expect: [["5"]]
