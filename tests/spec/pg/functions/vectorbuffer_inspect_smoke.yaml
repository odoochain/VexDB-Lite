name: vectorbuffer_inspect_smoke
tags: [pg-only, migrated, regression, buffer]
description: |
  vectorbuffer_inspect() SRF exists and
  returns at least one row when vex.enable_vec_buffer_manager is on
  and an index is in use. Pure callable-surface smoke; the original case
  required postgresql.conf restart (vector_buffers, shared_preload) which
  is out of scope for the spec runner — covered indirectly via index use.
engines: [pg]
steps:
  - statement: DROP TABLE IF EXISTS t_vb_inspect;
  - statement: CREATE TABLE t_vb_inspect (id int, v floatvector(4));
  - statement: |
      INSERT INTO t_vb_inspect
      SELECT i, ('[' || i || ',' || i || ',' || i || ',' || i || ']')::floatvector
      FROM generate_series(1, 20) AS t(i);
  - statement: CREATE INDEX idx_vb_inspect ON t_vb_inspect USING vexdb_graph (v floatvector_l2_ops);

  - query: SELECT count(*) FROM (SELECT id FROM t_vb_inspect ORDER BY v <-> '[5,5,5,5]'::floatvector LIMIT 3) s;
    expect: [["3"]]

  - query: SELECT count(*) >= 0 FROM vectorbuffer_inspect();
    expect: [["t"]]
