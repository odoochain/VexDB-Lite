name: array_to_floatvector_overloads
tags: [pg-only, migrated, regression, types]
description: |
  array_to_floatvector function form must work for real[] / double precision[]
  / integer[] / numeric[] with the (arr, dim, need_norm) signature. The
  assignment-cast variant is already covered by graph_index_array_cast.yaml;
  this case exercises the explicit 3-arg function call surface.
engines: [pg]
skip:
  pg: "array_to_floatvector 3-arg 形式部分重载触发 'cache lookup failed for function 700' (float4 OID), 待与主库 openGauss-vector-main 对齐"
steps:
  - query: SELECT array_to_floatvector(ARRAY[1,2,3,4]::integer[], 4, false);
    expect: [["[1,2,3,4]"]]
  - query: SELECT array_to_floatvector(ARRAY[1.0::real, 2.0::real, 3.0::real], 3, false);
    expect: [["[1,2,3]"]]
  - query: SELECT array_to_floatvector(ARRAY[1.0::float8, 2.0::float8, 3.0::float8], 3, false);
    expect: [["[1,2,3]"]]
  - query: SELECT array_to_floatvector(ARRAY[1.0::numeric, 2.0::numeric, 3.0::numeric], 3, false);
    expect: [["[1,2,3]"]]

  # dim != array length → error
  - statement: SELECT array_to_floatvector(ARRAY[1,2,3]::integer[], 4, false);
    expect_error: ""
