name: floatvector_arithmetic
tags: [pg-only, migrated, regression, types]
description: |
  floatvector_add (+) / floatvector_sub (-)
  operators must compute element-wise and reject dim-mismatched pairs.
engines: [pg]
steps:
  # element-wise add
  - query: SELECT '[1,1,1,1]'::floatvector + '[2,2,2,2]'::floatvector;
    expect: [["[3,3,3,3]"]]

  # element-wise sub
  - query: SELECT '[1,2,3,4]'::floatvector - '[1,1,1,1]'::floatvector;
    expect: [["[0,1,2,3]"]]

  # dim mismatch → error
  - statement: SELECT '[1,2]'::floatvector + '[1,2,3]'::floatvector;
    expect_error: ""
  - statement: SELECT '[1,2,3]'::floatvector - '[1,2]'::floatvector;
    expect_error: ""

  # NULL propagation
  - query: SELECT '[1,2]'::floatvector + NULL::floatvector IS NULL;
    expect: [["t"]]
  - query: SELECT NULL::floatvector - '[1,2]'::floatvector IS NULL;
    expect: [["t"]]
